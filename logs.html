<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logs</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0f0c;--panel:#111816;--accent:#00ff88;--accent2:#19c37d;--border:#1c2a25;--text:#e6f2ec;--muted:#8fa39a}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:18px}
.pw{max-width:1200px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.tl{display:flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#0b0f0c;border:none;border-radius:8px;padding:9px 16px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.85}
.save-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent2);opacity:0;transition:opacity .3s;margin-left:4px}
.save-dot.show{opacity:1}
.analytics-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer;user-select:none}
.tswitch{width:34px;height:18px;background:var(--border);border-radius:9px;position:relative;transition:background .2s;cursor:pointer;flex-shrink:0}
.tswitch.on{background:var(--accent2)}
.tswitch::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s}
.tswitch.on::after{transform:translateX(16px)}
.abar{display:none;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:10px;margin-bottom:14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px}
.abar.show{display:grid}
.stat .slbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;display:block}
.stat .sval{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;display:block}
.stat .sval.pos{color:var(--accent)}.stat .sval.neg{color:#ff5f6d}
.tw{overflow-x:auto;border-radius:10px;border:1px solid var(--border);min-height:320px}
table{width:100%;border-collapse:collapse;min-width:920px}
thead tr{border-bottom:1px solid var(--border)}
th{padding:10px 9px;text-align:center;font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;background:var(--panel)}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.022)}
td{padding:7px 9px;vertical-align:middle;text-align:center}
.er td{color:var(--muted);font-size:13px;padding:58px 0;text-align:center}
.ci{background:none;border:none;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;width:100%;outline:none;padding:0;text-align:center}
.ci:focus{background:var(--bg);border-radius:5px;padding:3px 5px}
.dtc{display:flex;align-items:center;justify-content:center;gap:3px}
.dtc .di{font-size:10px;color:var(--muted);opacity:.45;pointer-events:none;flex-shrink:0;transition:all .15s}
.dtc:hover .di{opacity:1;color:var(--accent2)}
.ci.dti{font-size:12px}
.ci.dti::-webkit-calendar-picker-indicator{display:none!important}
.csel{background:none;border:none;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;cursor:pointer;padding:0;-webkit-appearance:none;text-align:center;width:100%}
.csel option{background:var(--panel)}
.tc{display:flex;flex-wrap:wrap;justify-content:center;gap:3px;align-items:center;cursor:pointer}
.pill{background:rgba(25,195,125,.10);color:var(--accent2);border-radius:20px;padding:3px 9px;font-size:11px;white-space:nowrap;border:1px solid rgba(25,195,125,.25);cursor:pointer;font-family:'Inter',sans-serif;user-select:none;transition:background .15s}
.pill:hover{background:rgba(25,195,125,.2)}
.pill.ep{background:none;border:1px dashed var(--border);color:var(--muted);padding:3px 8px}
.pill.ep:hover{border-color:var(--accent2);color:var(--text)}
.pp{position:fixed;z-index:400;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px;min-width:180px;max-width:240px;box-shadow:0 8px 28px rgba(0,0,0,.45);max-height:280px;overflow-y:auto}
.pps{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;outline:none;margin-bottom:8px}
.pps:focus{border-color:var(--accent2)}
.ppills{display:flex;flex-wrap:wrap;gap:5px}
.ppl{padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-family:'Inter',sans-serif;transition:all .12s;user-select:none}
.ppl:hover{border-color:var(--accent2);color:var(--text)}
.ppl.sel{background:rgba(25,195,125,.15);border-color:var(--accent2);color:var(--accent2);font-weight:500}
.pnew{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.pnew-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.stars{display:flex;justify-content:center;gap:2px}
.star{font-size:13px;cursor:pointer;color:var(--border);transition:color .1s;line-height:1}
.star.on{color:#f5c518}
.notes-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:5px 10px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.notes-btn:hover{border-color:var(--accent2);color:var(--text)}
.notes-btn.hc{border-color:var(--accent2);color:var(--accent2)}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:3px 7px;border-radius:5px;transition:all .15s}
.del-btn:hover{color:#ff5f6d;background:rgba(255,95,109,.1)}
.pw-cell{position:relative}
.sugs{position:absolute;top:100%;left:50%;transform:translateX(-50%);z-index:50;background:var(--panel);border:1px solid var(--border);border-radius:8px;min-width:120px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.sug{padding:8px 12px;font-size:13px;cursor:pointer;transition:background .12s;text-align:left}
.sug:hover{background:var(--border)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:600;align-items:center;justify-content:center}
.overlay.open{display:flex}
.nmodal{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:100%;max-width:560px;margin:20px;max-height:88vh;overflow-y:auto;display:flex;flex-direction:column}
.nmhdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.nmhdr h3{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600}
.nmclose{background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;line-height:1}
.nmbody{padding:18px;flex:1}
.nmlbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.nmta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;resize:vertical;outline:none;min-height:96px;margin-bottom:14px;transition:border-color .2s}
.nmta:focus{border-color:var(--accent2)}
.nmimgs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.nmthumb{position:relative;cursor:pointer}
.nmthumb img{width:80px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--border);display:block}
.nmthumb .deli{position:absolute;top:-5px;right:-5px;background:#ff5f6d;color:#fff;border:none;border-radius:50%;width:17px;height:17px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nmuprow{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.upbtn{background:none;border:1px dashed var(--border);border-radius:7px;color:var(--muted);padding:8px 14px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.upbtn:hover{border-color:var(--accent2);color:var(--text)}
.nmftr{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:9px 16px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif}
.btn-ghost:hover{border-color:var(--muted)}
.cmodal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:26px;width:100%;max-width:360px;margin:20px}
.cmodal h4{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;margin-bottom:8px}
.cmodal p{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.cactions{display:flex;gap:8px}
.btn-del{background:#ff5f6d;color:#fff;border:none;border-radius:7px;padding:10px 18px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;flex:1}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:800;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:88vh;border-radius:8px;object-fit:contain}
.lb-x{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:11px 18px;font-size:13px;color:var(--text);box-shadow:0 8px 28px rgba(0,0,0,.4);z-index:9999;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="pw">
<div class="topbar">
  <div class="tl">
    <button class="btn-primary" onclick="addRow()">+ Add Trade</button>
    <span class="save-dot" id="saveDot"></span>
  </div>
  <label class="analytics-toggle" onclick="toggleAnalytics()">
    <div class="tswitch" id="aToggle"></div>
    Analytics
  </label>
</div>
<div class="abar" id="aBar">
  <div class="stat"><span class="slbl">Trades</span><span class="sval" id="sTrades">0</span></div>
  <div class="stat"><span class="slbl">Win Rate</span><span class="sval" id="sWR">—</span></div>
  <div class="stat"><span class="slbl">Wins</span><span class="sval pos" id="sW">0</span></div>
  <div class="stat"><span class="slbl">Losses</span><span class="sval neg" id="sL">0</span></div>
  <div class="stat"><span class="slbl">Win Streak</span><span class="sval pos" id="sWS">0</span></div>
  <div class="stat"><span class="slbl">Loss Streak</span><span class="sval neg" id="sLS">0</span></div>
  <div class="stat"><span class="slbl">Avg R</span><span class="sval" id="sR">—</span></div>
  <div class="stat"><span class="slbl">Total PNL</span><span class="sval" id="sP">—</span></div>
</div>
<div class="tw">
  <table>
    <thead><tr>
      <th>#</th><th>Date</th><th>Time</th><th>Pair</th><th>Position</th>
      <th>Strategy</th><th>Timeframe</th><th>PNL</th><th>R Factor</th>
      <th>Confidence</th><th>Mood</th><th>Notes</th><th></th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div class="pp" id="pp" style="display:none" onclick="event.stopPropagation()"></div>
</div>

<!-- Notes -->
<div class="overlay" id="nOverlay">
  <div class="nmodal">
    <div class="nmhdr"><h3 id="nmTitle">Notes</h3><button class="nmclose" onclick="closeNotes()">✕</button></div>
    <div class="nmbody">
      <div class="nmlbl">Notes</div>
      <textarea class="nmta" id="nmText" placeholder="Analysis, observations, screenshots…"></textarea>
      <div class="nmlbl">Images</div>
      <div class="nmimgs" id="nmImgs"></div>
      <div class="nmuprow">
        <button class="upbtn" onclick="document.getElementById('nmFile').click()">📎 Upload Image</button>
        <input type="file" id="nmFile" accept="image/*" multiple style="display:none" onchange="handleUpload(event)">
        <span style="font-size:12px;color:var(--muted)">or paste (Ctrl+V)</span>
      </div>
    </div>
    <div class="nmftr">
      <button class="btn-ghost" onclick="closeNotes()">Cancel</button>
      <button class="btn-primary" onclick="saveNotes()">Save Notes</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="overlay" id="cOverlay">
  <div class="cmodal">
    <h4>Delete Trade</h4>
    <p>Permanently removes this trade, notes and images. Cannot be undone.</p>
    <div class="cactions">
      <button class="btn-ghost" onclick="closeCon()" style="flex:1">Cancel</button>
      <button class="btn-del" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="this.classList.remove('open')">
  <button class="lb-x" onclick="document.getElementById('lb').classList.remove('open')">✕</button>
  <img id="lbImg" src="" alt="">
</div>

<div id="toast"></div>

<script>
function applyTheme(t){
  const r=document.documentElement,dk=t==='dark'||(t==='system'&&!window.matchMedia('(prefers-color-scheme:light)').matches);
  if(!dk){r.style.setProperty('--bg','#f6faf8');r.style.setProperty('--panel','#ffffff');r.style.setProperty('--accent','#19c37d');r.style.setProperty('--accent2','#0fa86a');r.style.setProperty('--border','#d9e5df');r.style.setProperty('--text','#0f1c17');r.style.setProperty('--muted','#6b8578');}
  else{r.style.setProperty('--bg','#0b0f0c');r.style.setProperty('--panel','#111816');r.style.setProperty('--accent','#00ff88');r.style.setProperty('--accent2','#19c37d');r.style.setProperty('--border','#1c2a25');r.style.setProperty('--text','#e6f2ec');r.style.setProperty('--muted','#8fa39a');}
}
(()=>applyTheme(localStorage.getItem('tl_theme')||'dark'))();

const jid = sessionStorage.getItem('tz_current_journal') || parent?.sessionStorage?.getItem?.('tz_current_journal');
let currentUser=null, trades=[], settings=null;
let analyticsOn=localStorage.getItem('tl_analytics_on')!=='false';
let pendingDeleteId=null, activeNotesId=null, imgBuffer=[], activePill=null;
let saveTimer=null;

(async()=>{
  const {data:{user}}=await db.auth.getUser();
  currentUser=user;
  if(!currentUser||!jid){showToast('Session expired. Please log in.');return;}
  settings=await getJournalSettings(jid);
  const raw=await getTrades(jid);
  trades=raw.map(dbToTrade);
  applyAnalyticsState();render();
  subscribeTrades(jid,()=>refreshTrades());
  window.addEventListener('message',e=>{if(e.data?.type==='tz_settings_updated')reloadSettings();});
})();

async function reloadSettings(){settings=await getJournalSettings(jid);render();}
async function refreshTrades(){const r=await getTrades(jid);trades=r.map(dbToTrade);render();}

// ── Mood helpers ───────────────────────────────────────────
function getMC(){return settings?.mood_colors||{};}
function moodStyle(m){const c=getMC()[m];if(!c)return'';const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);return`background:rgba(${r},${g},${b},.15);color:${c};border-color:rgba(${r},${g},${b},.35)`;}
function tags(type){if(!settings)return[];const k={strategy:'strategies',timeframe:'timeframes',pair:'pairs',mood:'moods'};return settings[k[type]]||[];}

// ── Format helpers ─────────────────────────────────────────
function fmtVal(v,type){const n=parseFloat(v);if(isNaN(n)||v==null||v==='')return'';return type==='pnl'?(n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2):(n>=0?'+':'')+n.toFixed(2)+'R';}
function pnlCol(v){const n=parseFloat(v);return n>0?'var(--accent)':n<0?'#ff5f6d':'var(--muted)';}
function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}

// ── Render ─────────────────────────────────────────────────
function render(){
  const tb=document.getElementById('tbody');
  if(!trades.length){tb.innerHTML='<tr class="er"><td colspan="13">No trades yet. Click "+ Add Trade" to begin.</td></tr>';updateAnalytics();return;}
  tb.innerHTML='';
  trades.forEach((t,i)=>{
    const tr=document.createElement('tr');tr.dataset.id=t.id;
    const hasN=(t.notes&&t.notes.trim())||(t.images&&t.images.length);
    tr.innerHTML=`
      <td style="color:var(--muted);font-size:11px">${i+1}</td>
      <td><div class="dtc"><input class="ci dti" type="date" value="${t.date||''}" onchange="updF('${t.id}','date',this.value)"><i class="fa-solid fa-pencil di"></i></div></td>
      <td><div class="dtc"><input class="ci dti" type="time" value="${t.time||''}" onchange="updF('${t.id}','time',this.value)" style="min-width:60px"><i class="fa-solid fa-pencil di"></i></div></td>
      <td class="pw-cell">
        <input class="ci" value="${esc(t.pair||'')}" placeholder="EURUSD" oninput="showSug(this,'${t.id}')" onfocus="showSug(this,'${t.id}')" onblur="confirmPair('${t.id}',this);hideSug()" style="min-width:68px">
        <div class="sugs" id="sug_${t.id}" style="display:none"></div>
      </td>
      <td><select class="csel" onchange="updPos(this,'${t.id}')" style="min-width:52px;font-weight:600;color:${t.position==='Short'?'#ff5f6d':'var(--accent)'}"><option ${t.position==='Long'?'selected':''}>Long</option><option ${t.position==='Short'?'selected':''}>Short</option></select></td>
      <td><div class="tc" id="st_${t.id}" onclick="openPP(event,'${t.id}','strategy')">${(t.strategy||[]).length?(t.strategy).map(s=>`<span class="pill">${esc(s)}</span>`).join(''):'<span class="pill ep">+ Strategy</span>'}</div></td>
      <td><div class="tc" id="tf_${t.id}" onclick="openPP(event,'${t.id}','timeframe')">${(t.timeframe||[]).length?(t.timeframe).map(s=>`<span class="pill">${esc(s)}</span>`).join(''):'<span class="pill ep">+ Timeframe</span>'}</div></td>
      <td><input class="ci" id="pnl_${t.id}" type="text" inputmode="decimal" value="${fmtVal(t.pnl,'pnl')}" placeholder="0.00" onfocus="vFocus(this)" onblur="vBlur(this,'${t.id}','pnl')" oninput="localUpd('${t.id}','pnl',this.value)" style="min-width:66px;font-weight:600;color:${pnlCol(t.pnl)}"></td>
      <td><input class="ci" id="r_${t.id}" type="text" inputmode="decimal" value="${fmtVal(t.r,'r')}" placeholder="+2R" onfocus="vFocus(this)" onblur="vBlur(this,'${t.id}','r')" oninput="localUpd('${t.id}','r',this.value)" style="min-width:48px;font-weight:600;color:${pnlCol(t.r)}"></td>
      <td><div class="stars" id="s_${t.id}">${[1,2,3,4,5].map(n=>`<span class="star ${(t.confidence||0)>=n?'on':''}" onclick="setConf('${t.id}',${n})">★</span>`).join('')}</div></td>
      <td><div class="tc" id="md_${t.id}" onclick="openPP(event,'${t.id}','mood')">${(t.mood||[]).length?(t.mood).map(m=>`<span class="pill" style="${moodStyle(m)}">${esc(m)}</span>`).join(''):'<span class="pill ep">+ Mood</span>'}</div></td>
      <td><button class="notes-btn ${hasN?'hc':''}" onclick="openNotes('${t.id}')">${hasN?'📝 View':'📝 Add'}</button></td>
      <td><button class="del-btn" onclick="askDel('${t.id}')">✕</button></td>`;
    tb.appendChild(tr);
  });
  updateAnalytics();
}

// ── Val input handling ─────────────────────────────────────
function vFocus(el){const n=parseFloat(el.value.replace(/[^0-9.+-]/g,''));el.value=isNaN(n)?'':n;el.style.color='var(--text)';el.select();}
function vBlur(el,id,field){const raw=el.value.trim(),n=parseFloat(raw);if(!isNaN(n)&&raw!==''){el.value=fmtVal(n,field);el.style.color=pnlCol(n);}else{el.value='';el.style.color='var(--muted)';}debounceSave(id);}
function localUpd(id,field,val){const t=trades.find(x=>x.id===id);if(t){t[field]=val;const el=document.getElementById((field==='pnl'?'pnl_':'r_')+id);if(el)el.style.color=pnlCol(val);}updateAnalytics();}
function debounceSave(id){clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveToDb(id),650);}
async function saveToDb(id){const t=trades.find(x=>x.id===id);if(!t)return;showDot(true);try{await updateTrade(id,t);}catch(e){showToast('Save error: '+e.message);}showDot(false);}
function updF(id,f,v){localUpd(id,f,v);debounceSave(id);}
function updPos(sel,id){updF(id,'position',sel.value);sel.style.color=sel.value==='Short'?'#ff5f6d':'var(--accent)';}
async function setConf(id,n){const t=trades.find(x=>x.id===id);if(!t)return;t.confidence=n;document.querySelectorAll(`[data-id="${id}"] .star`).forEach((s,i)=>s.classList.toggle('on',i<n));await updateTrade(id,{confidence:n});}

// ── Add / Delete ───────────────────────────────────────────
async function addRow(){
  showDot(true);
  const now=new Date(),date=now.toISOString().split('T')[0],time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  try{const row=await createTrade(currentUser.id,jid,{date,time,pair:'',position:'Long',strategy:[],timeframe:[],pnl:'',r:'',confidence:0,mood:[],notes:'',images:[]});
    trades.unshift({id:row.id,date,time,pair:'',position:'Long',strategy:[],timeframe:[],pnl:'',r:'',confidence:0,mood:[],notes:'',images:[]});render();}
  catch(e){showToast('Error: '+e.message);}finally{showDot(false);}
}
function askDel(id){pendingDeleteId=id;document.getElementById('cOverlay').classList.add('open');}
function closeCon(){pendingDeleteId=null;document.getElementById('cOverlay').classList.remove('open');}
async function confirmDelete(){if(!pendingDeleteId)return;try{await deleteTrade(pendingDeleteId);trades=trades.filter(t=>t.id!==pendingDeleteId);closeCon();render();}catch(e){showToast('Error: '+e.message);}}

// ── Pair suggestions ───────────────────────────────────────
function allPairs(){return[...new Set([...tags('pair'),...trades.map(t=>(t.pair||'').toUpperCase()).filter(Boolean)])].sort();}
function showSug(el,id){const v=el.value.toUpperCase().trim(),box=document.getElementById('sug_'+id),all=allPairs(),m=v?all.filter(p=>p.includes(v)&&p!==v):all.filter(p=>p!==v);if(!m.length){box.style.display='none';return;}box.innerHTML=m.slice(0,8).map(p=>`<div class="sug" onmousedown="pickPair('${id}','${p}')">${p}</div>`).join('');box.style.display='block';}
function hideSug(){setTimeout(()=>document.querySelectorAll('.sugs').forEach(s=>s.style.display='none'),180);}
function confirmPair(id,el){const v=el.value.trim().toUpperCase();if(!v)return;el.value=v;updF(id,'pair',v);}
function pickPair(id,p){updF(id,'pair',p);const inp=document.getElementById('sug_'+id)?.previousElementSibling;if(inp)inp.value=p;document.getElementById('sug_'+id).style.display='none';}

// ── Pill popup ─────────────────────────────────────────────
function openPP(e,id,field){e.stopPropagation();const rect=e.currentTarget.getBoundingClientRect(),popup=document.getElementById('pp');activePill={id,field};renderPP(id,field,'');popup.style.display='block';let t=rect.bottom+window.scrollY+4,l=rect.left,pw=popup.offsetWidth||200;if(l+pw>window.innerWidth-8)l=window.innerWidth-pw-8;popup.style.top=t+'px';popup.style.left=Math.max(4,l)+'px';popup.querySelector('.pps')?.focus();}
function renderPP(id,field,filter){const popup=document.getElementById('pp'),t=trades.find(x=>x.id===id),sel=t?(t[field]||[]):[],all=tags(field),fil=filter?all.filter(l=>l.toLowerCase().includes(filter.toLowerCase())):all;
popup.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px"><span style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px">${field}</span><button onclick="closePP()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:0">✕</button></div>
<input class="pps" placeholder="Search or add…" value="${esc(filter)}" oninput="renderPP('${id}','${field}',this.value)" onkeydown="ppKey(event,'${id}','${field}',this.value)">
<div class="ppills">${fil.length?fil.map(tag=>`<span class="ppl ${sel.includes(tag)?'sel':''}" style="${field==='mood'?moodStyle(tag):''}" onclick="toggleTag('${id}','${field}','${esc(tag)}')">${esc(tag)}</span>`).join(''):'<span style="font-size:12px;color:var(--muted)">No tags yet</span>'}</div>
${filter&&!all.find(t=>t.toLowerCase()===filter.toLowerCase())?`<div class="pnew"><div class="pnew-lbl">Create new</div><span class="ppl" style="border-style:dashed" onclick="createTag('${id}','${field}','${esc(filter)}')">${esc(filter)}</span></div>`:''}`;}

function ppKey(e,id,field,val){if(e.key==='Enter'&&val.trim()){const ex=tags(field).find(t=>t.toLowerCase()===val.trim().toLowerCase());if(ex)toggleTag(id,field,ex);else createTag(id,field,val.trim());}if(e.key==='Escape')closePP();}

async function toggleTag(id,field,val){const t=trades.find(x=>x.id===id);if(!t)return;if(!t[field])t[field]=[];const idx=t[field].indexOf(val);if(idx>-1)t[field].splice(idx,1);else t[field].push(val);if(activePill){const f=document.querySelector('#pp .pps')?.value||'';renderPP(id,field,f);requestAnimationFrame(()=>{const i=document.querySelector('#pp .pps');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}});}updateTagCell(id,field,t[field]);await updateTrade(id,{[field]:t[field]});}

async function createTag(id,field,val){const v=val.trim();if(!v||!settings)return;const k={strategy:'strategies',timeframe:'timeframes',pair:'pairs',mood:'moods'}[field];if(!settings[k].find(x=>x.toLowerCase()===v.toLowerCase())){settings[k]=[...settings[k],v];await updateJournalSettings(jid,{[k]:settings[k]});}toggleTag(id,field,v);requestAnimationFrame(()=>{const i=document.querySelector('#pp .pps');if(i){i.value='';i.focus();renderPP(id,field,'');}});}

function updateTagCell(id,field,sel){const pre=field==='strategy'?'st_':field==='timeframe'?'tf_':'md_';const c=document.getElementById(pre+id);if(!c)return;const lbl={strategy:'+ Strategy',timeframe:'+ Timeframe',mood:'+ Mood'}[field]||'+';c.innerHTML=sel.length?sel.map(s=>`<span class="pill"${field==='mood'?` style="${moodStyle(s)}"`:''} >${esc(s)}</span>`).join(''):`<span class="pill ep">${lbl}</span>`;}
function closePP(){document.getElementById('pp').style.display='none';activePill=null;}
document.addEventListener('click',()=>{if(document.getElementById('pp').style.display!=='none')closePP();});

// ── Notes ──────────────────────────────────────────────────
function openNotes(id){const t=trades.find(x=>x.id===id);if(!t)return;activeNotesId=id;imgBuffer=JSON.parse(JSON.stringify(t.images||[]));document.getElementById('nmTitle').textContent=`Notes — ${t.pair||'Trade'} (${t.date||'—'})`;document.getElementById('nmText').value=t.notes||'';renderImgs();document.getElementById('nOverlay').classList.add('open');setTimeout(()=>document.getElementById('nmText').focus(),100);}
function closeNotes(){document.getElementById('nOverlay').classList.remove('open');activeNotesId=null;imgBuffer=[];}
async function saveNotes(){if(!activeNotesId)return;const t=trades.find(x=>x.id===activeNotesId);if(!t)return;const newNotes=document.getElementById('nmText').value;showDot(true);
try{await updateTrade(activeNotesId,{notes:newNotes});t.notes=newNotes;
const currentIds=new Set((t.images||[]).filter(i=>i.id).map(i=>i.id));
for(const img of(t.images||[])){if(img.id&&!imgBuffer.find(b=>b.id===img.id))await deleteTradeImage(img.id);}
const final=[];for(const img of imgBuffer){if(img.id){final.push(img);}else{const s=await addTradeImage(currentUser.id,activeNotesId,img.data);final.push({id:s.id,data:img.data});}}
t.images=final;closeNotes();render();}catch(e){showToast('Save error: '+e.message);}finally{showDot(false);}}
function renderImgs(){const b=document.getElementById('nmImgs');if(!imgBuffer.length){b.innerHTML='<span style="font-size:12px;color:var(--muted)">No images.</span>';return;}b.innerHTML=imgBuffer.map((img,i)=>`<div class="nmthumb"><img src="${img.data}" onclick="document.getElementById('lbImg').src=this.src;document.getElementById('lb').classList.add('open')" alt=""><button class="deli" onclick="rmImg(${i})">×</button></div>`).join('');}
function rmImg(i){imgBuffer.splice(i,1);renderImgs();}
function handleUpload(e){[...e.target.files].forEach(f=>{const r=new FileReader();r.onload=ev=>{imgBuffer.push({data:ev.target.result});renderImgs();};r.readAsDataURL(f);});e.target.value='';}
document.addEventListener('paste',e=>{if(!document.getElementById('nOverlay').classList.contains('open'))return;[...e.clipboardData.items].forEach(item=>{if(item.type.startsWith('image/')){const r=new FileReader();r.onload=ev=>{imgBuffer.push({data:ev.target.result});renderImgs();};r.readAsDataURL(item.getAsFile());}});});

// ── Analytics ──────────────────────────────────────────────
function toggleAnalytics(){analyticsOn=!analyticsOn;localStorage.setItem('tl_analytics_on',analyticsOn);applyAnalyticsState();updateAnalytics();}
function applyAnalyticsState(){document.getElementById('aToggle').classList.toggle('on',analyticsOn);document.getElementById('aBar').classList.toggle('show',analyticsOn);}
function updateAnalytics(){if(!analyticsOn)return;const vld=trades.filter(t=>t.pnl!==''&&!isNaN(parseFloat(t.pnl))),wins=vld.filter(t=>parseFloat(t.pnl)>0),losses=vld.filter(t=>parseFloat(t.pnl)<0),total=vld.reduce((s,t)=>s+parseFloat(t.pnl),0),rv=trades.filter(t=>t.r&&!isNaN(parseFloat(t.r))).map(t=>parseFloat(t.r)),avgR=rv.length?rv.reduce((a,b)=>a+b,0)/rv.length:0,wr=vld.length?wins.length/vld.length*100:0;
let mxW=0,mxL=0,cW=0,cL=0;vld.forEach(t=>{const p=parseFloat(t.pnl);if(p>0){cW++;cL=0;if(cW>mxW)mxW=cW;}else if(p<0){cL++;cW=0;if(cL>mxL)mxL=cL;}else{cW=0;cL=0;}});
document.getElementById('sTrades').textContent=trades.length;
document.getElementById('sWR').textContent=vld.length?wr.toFixed(1)+'%':'—';
document.getElementById('sW').textContent=wins.length;document.getElementById('sL').textContent=losses.length;
document.getElementById('sWS').textContent=mxW;document.getElementById('sLS').textContent=mxL;
document.getElementById('sR').textContent=rv.length?(avgR>=0?'+':'')+avgR.toFixed(2)+'R':'—';
const pe=document.getElementById('sP');if(vld.length){pe.textContent=(total>=0?'+':'-')+'$'+Math.abs(total).toFixed(2);pe.className='sval '+(total>=0?'pos':'neg');}else{pe.textContent='—';pe.className='sval';}}

// ── UI helpers ─────────────────────────────────────────────
function showDot(v){document.getElementById('saveDot').classList.toggle('show',v);}
let _tt;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3200);}
document.getElementById('nOverlay').addEventListener('click',function(e){if(e.target===this)closeNotes();});
document.getElementById('cOverlay').addEventListener('click',function(e){if(e.target===this)closeCon();});
</script>
