<!-- notes.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Notes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f0c;--panel:#111816;--panel2:#161d1a;
  --accent:#00ff88;--accent2:#19c37d;
  --border:#1c2a25;--border2:#243530;
  --text:#e6f2ec;--muted:#8fa39a;--muted2:#5c7068;
  --red:#ff5f6d;--amber:#f59e0b;--blue:#60a5fa;
}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}

body{
  visibility:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding:0;
}

/* ── Layout ── */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  background:rgba(11,15,12,.92);
  backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;
  flex-wrap:wrap;gap:10px;
}
.topbar-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tb-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-title i{color:var(--accent2)}
.tb-count{font-size:11px;color:var(--muted);background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:2px 9px}

/* Search */
.search-wrap{position:relative;flex:1;max-width:320px}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
.search-inp{
  width:100%;background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:8px 11px 8px 32px;
  color:var(--text);font-family:'Inter',sans-serif;font-size:13px;
  outline:none;transition:border-color .2s;
}
.search-inp:focus{border-color:var(--accent2)}
.search-inp::placeholder{color:var(--muted)}

/* Filter pills */
.filter-bar{
  display:flex;align-items:center;gap:6px;
  padding:10px 20px;border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
  background:var(--panel);
}
.filter-bar::-webkit-scrollbar{display:none}
.filter-lbl{font-size:11px;color:var(--muted);white-space:nowrap;margin-right:2px;flex-shrink:0}
.fpill{
  border:1px solid var(--border);border-radius:20px;
  padding:4px 12px;font-size:12px;color:var(--muted);
  background:none;cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.fpill:hover{border-color:var(--accent2);color:var(--text)}
.fpill.active{border-color:var(--accent2);color:var(--accent2);background:rgba(0,255,136,.07)}

/* Main content */
.main{flex:1;padding:20px;overflow:auto}
.pw{max-width:1200px;margin:0 auto}

/* Skeleton */
.skel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.skel-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.skel-img{height:130px;background:linear-gradient(90deg,var(--panel) 25%,rgba(255,255,255,.04) 50%,var(--panel) 75%);background-size:600px 100%;animation:shimmer 1.4s infinite}
.skel-body{padding:12px;display:flex;flex-direction:column;gap:8px}
.skel-line{height:11px;border-radius:4px;background:linear-gradient(90deg,var(--panel) 25%,rgba(255,255,255,.04) 50%,var(--panel) 75%);background-size:600px 100%;animation:shimmer 1.4s infinite}
.skel-line.s{width:55%}.skel-line.m{width:75%}

/* Notes Grid */
.notes-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:14px;
}

/* Note Card */
.nc{
  background:var(--panel);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;cursor:pointer;
  transition:border-color .18s,transform .18s,box-shadow .18s;
  animation:fadeUp .3s ease both;
  position:relative;
  display:flex;flex-direction:column;
}
.nc:hover{
  border-color:var(--accent2);
  transform:translateY(-3px);
  box-shadow:0 8px 28px rgba(0,0,0,.35);
}
.nc-img{
  width:100%;height:130px;object-fit:cover;
  display:block;background:var(--panel2);flex-shrink:0;
}
.nc-img-count{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.65);border-radius:12px;
  padding:2px 8px;font-size:10px;font-weight:600;
  display:flex;align-items:center;gap:4px;
  backdrop-filter:blur(4px);
}
.nc-no-img{
  height:60px;display:flex;align-items:center;justify-content:center;
  background:var(--panel2);color:var(--muted2);font-size:20px;
  flex-shrink:0;
}
.nc-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:5px}
.nc-pair{
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:6px;
}
.nc-pos{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px}
.nc-pos.long{background:rgba(0,255,136,.12);color:var(--accent2)}
.nc-pos.short{background:rgba(255,95,109,.12);color:var(--red)}
.nc-date{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.nc-pnl{font-size:12px;font-weight:600}
.nc-pnl.pos{color:var(--accent)}.nc-pnl.neg{color:var(--red)}
.nc-preview{
  font-size:12px;color:var(--muted);
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
  line-height:1.5;margin-top:3px;flex:1;
}
.nc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.nc-tag{
  background:rgba(25,195,125,.1);color:var(--accent2);
  border-radius:4px;padding:1px 6px;font-size:10px;
}

/* Empty state */
.empty-state{
  grid-column:1/-1;text-align:center;
  padding:80px 20px;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.empty-state .ei{font-size:48px;opacity:.2;line-height:1}
.empty-state h3{font-family:'Space Grotesk',sans-serif;font-size:16px;color:var(--text);font-weight:600}
.empty-state p{font-size:13px;line-height:1.7;max-width:320px}

/* ── Detail Modal ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);z-index:500;
  align-items:flex-start;justify-content:center;
  padding:20px;overflow-y:auto;
  backdrop-filter:blur(4px);
}
.overlay.open{display:flex;animation:fadeIn .2s ease}
.modal{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:16px;width:100%;max-width:760px;
  margin:auto;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 24px 64px rgba(0,0,0,.6);
}

/* Image strip in modal */
.modal-imgs{position:relative;background:#000;min-height:0}
.modal-imgs.has-imgs{min-height:280px;max-height:380px}
.img-strip{
  display:flex;overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  height:100%;
}
.img-strip::-webkit-scrollbar{height:4px}
.img-strip::-webkit-scrollbar-track{background:transparent}
.img-strip::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.strip-img{
  flex-shrink:0;height:280px;max-height:380px;
  object-fit:cover;cursor:zoom-in;
  transition:transform .2s;border-right:1px solid #000;
}
.strip-img:hover{transform:scale(1.01)}
.strip-img:only-child{width:100%;object-fit:contain;height:300px}
.modal-img-actions{
  position:absolute;top:10px;right:10px;
  display:flex;gap:6px;
}
.mia-btn{
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);
  color:#fff;border-radius:7px;padding:6px 10px;
  font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;
  display:flex;align-items:center;gap:5px;transition:background .15s;
  backdrop-filter:blur(4px);
}
.mia-btn:hover{background:rgba(0,0,0,.8)}
.img-count-badge{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);border-radius:12px;padding:3px 12px;
  font-size:11px;backdrop-filter:blur(4px);
}

/* Modal body */
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:0;flex:1;overflow-y:auto;max-height:70vh}
.modal-hdr{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:12px;margin-bottom:16px;flex-wrap:wrap;
}
.modal-trade-info{flex:1;min-width:0}
.modal-pair{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.modal-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.meta-chip{
  display:flex;align-items:center;gap:5px;
  font-size:12px;color:var(--muted);
  background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:4px 9px;
}
.meta-chip.pos{color:var(--accent);border-color:rgba(0,255,136,.25);background:rgba(0,255,136,.06)}
.meta-chip.neg{color:var(--red);border-color:rgba(255,95,109,.25);background:rgba(255,95,109,.06)}
.meta-chip.amb{color:var(--amber);border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.06)}
.modal-close{
  background:none;border:1px solid var(--border);color:var(--muted);
  cursor:pointer;width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;font-size:15px;
}
.modal-close:hover{background:var(--border);color:var(--text)}

/* Tags section */
.modal-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.mtag{background:rgba(25,195,125,.1);color:var(--accent2);border:1px solid rgba(25,195,125,.2);border-radius:20px;padding:3px 10px;font-size:11px}
.mtag.mood{border-radius:4px}

/* Editable note area */
.note-edit-section{margin-bottom:14px}
.note-section-lbl{
  font-size:10px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:7px;
  display:flex;align-items:center;gap:6px;
}
.note-section-lbl i{color:var(--accent2);font-size:9px}
.note-ta{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:9px;padding:12px;color:var(--text);
  font-family:'Inter',sans-serif;font-size:13px;line-height:1.7;
  resize:vertical;outline:none;min-height:100px;
  transition:border-color .2s;
}
.note-ta:focus{border-color:var(--accent2)}
.note-ta::placeholder{color:var(--muted2)}
.autosave-status{font-size:11px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:5px;min-height:16px}
.autosave-status.saving{color:var(--amber);animation:pulse 1s ease infinite}
.autosave-status.saved{color:var(--accent2)}
.autosave-status.err{color:var(--red)}

/* Image management in modal */
.img-manager{margin-bottom:14px}
.img-thumbs-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.img-th{
  position:relative;width:80px;height:60px;
  border-radius:7px;overflow:hidden;
  border:1px solid var(--border);cursor:pointer;
  transition:border-color .15s;flex-shrink:0;
}
.img-th:hover{border-color:var(--accent2)}
.img-th img{width:100%;height:100%;object-fit:cover}
.img-th .rm-img{
  position:absolute;top:3px;right:3px;
  background:rgba(255,95,109,.9);color:#fff;
  border:none;border-radius:50%;width:16px;height:16px;
  font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;
}
.img-th:hover .rm-img{opacity:1}
.add-img-btn{
  display:flex;align-items:center;justify-content:center;
  gap:6px;padding:7px 12px;
  background:none;border:1px dashed var(--border);
  border-radius:7px;color:var(--muted);
  font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .15s;white-space:nowrap;
}
.add-img-btn:hover{border-color:var(--accent2);color:var(--text)}
.img-hint{font-size:10px;color:var(--muted2);margin-top:4px}

/* Lightbox */
.lb{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.94);z-index:1000;
  align-items:center;justify-content:center;
  padding:20px;
}
.lb.open{display:flex;animation:fadeIn .2s}
.lb img{max-width:92vw;max-height:88vh;border-radius:8px;object-fit:contain}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.1);border:none;color:#fff;
  font-size:18px;cursor:pointer;width:44px;height:44px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.lb-nav:hover{background:rgba(255,255,255,.25)}
.lb-prev{left:16px}.lb-next{right:16px}
.lb-x{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:18px;cursor:pointer;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.lb-x:hover{background:rgba(255,255,255,.22)}

/* Save bar */
.save-indicator{
  position:fixed;bottom:16px;right:20px;
  background:var(--panel);border:1px solid var(--accent2);
  border-radius:10px;padding:9px 14px;
  font-size:12px;font-weight:500;color:var(--accent2);
  display:flex;align-items:center;gap:7px;
  box-shadow:0 4px 16px rgba(0,255,136,.15);
  opacity:0;pointer-events:none;transition:opacity .3s;z-index:200;
}
.save-indicator.show{opacity:1}

/* Toast */
#toast{
  position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:10px 16px;font-size:13px;color:var(--text);
  box-shadow:0 8px 28px rgba(0,0,0,.4);z-index:9999;
  opacity:0;pointer-events:none;transition:all .25s;
  white-space:nowrap;display:flex;align-items:center;gap:8px;max-width:90vw;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.g{border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.07)}
#toast.r{border-color:rgba(255,95,109,.4);background:rgba(255,95,109,.07)}

@media(max-width:600px){
  .notes-grid{grid-template-columns:1fr 1fr}
  .modal{margin:0;border-radius:0;min-height:100vh}
  .modal-body{max-height:none}
  .overlay{padding:0}
}
@media(max-width:380px){
  .notes-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="tb-title"><i class="fa-solid fa-note-sticky"></i> Trade Notes</div>
      <span class="tb-count" id="noteCount">—</span>
    </div>
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input class="search-inp" id="searchInp" type="text" placeholder="Search notes…" oninput="applyFilters()">
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <span class="filter-lbl"><i class="fa-solid fa-filter" style="margin-right:3px"></i>Filter:</span>
    <button class="fpill active" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button class="fpill" data-filter="has_note" onclick="setFilter('has_note',this)">Has Note</button>
    <button class="fpill" data-filter="has_img" onclick="setFilter('has_img',this)">Has Image</button>
    <button class="fpill" data-filter="win" onclick="setFilter('win',this)">Wins <i class="fa-solid fa-arrow-trend-up" style="font-size:9px;margin-left:2px;color:var(--accent2)"></i></button>
    <button class="fpill" data-filter="loss" onclick="setFilter('loss',this)">Losses <i class="fa-solid fa-arrow-trend-down" style="font-size:9px;margin-left:2px;color:var(--red)"></i></button>
    <button class="fpill" data-filter="long" onclick="setFilter('long',this)">Long</button>
    <button class="fpill" data-filter="short" onclick="setFilter('short',this)">Short</button>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="pw">
      <!-- Skeleton -->
      <div class="skel-grid" id="skelGrid">
        <div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line m"></div><div class="skel-line s"></div><div class="skel-line"></div></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line m"></div><div class="skel-line s"></div><div class="skel-line"></div></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line m"></div><div class="skel-line s"></div><div class="skel-line"></div></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line m"></div><div class="skel-line s"></div><div class="skel-line"></div></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line m"></div><div class="skel-line s"></div><div class="skel-line"></div></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line m"></div><div class="skel-line s"></div><div class="skel-line"></div></div></div>
      </div>
      <!-- Notes grid -->
      <div class="notes-grid" id="notesGrid" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">

    <!-- Image strip -->
    <div class="modal-imgs" id="modalImgs">
      <div class="img-strip" id="imgStrip"></div>
      <div class="modal-img-actions" id="imgActions" style="display:none">
        <button class="mia-btn" onclick="triggerImgUpload()"><i class="fa-solid fa-plus"></i> Add Image</button>
        <input type="file" id="modalFileInp" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp" multiple style="display:none" onchange="handleModalUpload(event)">
      </div>
      <div class="img-count-badge" id="imgCountBadge" style="display:none"></div>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <div class="modal-hdr">
        <div class="modal-trade-info">
          <div class="modal-pair" id="modalPair">—</div>
          <div class="modal-meta" id="modalMeta"></div>
        </div>
        <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <!-- Tags -->
      <div class="modal-tags" id="modalTags"></div>

      <!-- Note editor -->
      <div class="note-edit-section">
        <div class="note-section-lbl"><i class="fa-solid fa-note-sticky"></i> Trade Notes</div>
        <textarea class="note-ta" id="modalNote" placeholder="No notes yet. Start typing to add analysis, observations, or what you learned from this trade…" oninput="onNoteInput()"></textarea>
        <div class="autosave-status" id="saveStatus"></div>
      </div>

      <!-- Image manager -->
      <div class="img-manager" id="imgManager">
        <div class="note-section-lbl"><i class="fa-solid fa-images"></i> Images <span id="imgMgrCount" style="color:var(--muted2);font-weight:400;text-transform:none;letter-spacing:0"></span></div>
        <div class="img-thumbs-row" id="imgThumbsRow"></div>
        <button class="add-img-btn" onclick="triggerImgUpload()">
          <i class="fa-solid fa-paperclip"></i> Attach Image
          <span style="color:var(--muted2);font-weight:400">(or Ctrl+V to paste)</span>
        </button>
        <div class="img-hint">PNG, JPG, GIF, WebP · max 5 MB per image</div>
      </div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="lbClick(event)">
  <button class="lb-x" onclick="closeLb()"><i class="fa-solid fa-xmark"></i></button>
  <button class="lb-nav lb-prev" id="lbPrev" onclick="lbNav(-1)"><i class="fa-solid fa-chevron-left"></i></button>
  <img id="lbImg" src="" alt="">
  <button class="lb-nav lb-next" id="lbNext" onclick="lbNav(1)"><i class="fa-solid fa-chevron-right"></i></button>
</div>

<!-- Save indicator -->
<div class="save-indicator" id="saveIndicator"><i class="fa-solid fa-check"></i> Saved</div>

<div id="toast"><i id="toastIcon"></i><span id="toastMsg"></span></div>

<script>
// ── Theme ─────────────────────────────────────────────────────
function applyTheme(t){const r=document.documentElement,dk=t==='dark'||(t==='system'&&!window.matchMedia('(prefers-color-scheme:light)').matches);if(!dk){r.style.setProperty('--bg','#f4f7f5');r.style.setProperty('--panel','#ffffff');r.style.setProperty('--panel2','#f0f4f2');r.style.setProperty('--accent','#19c37d');r.style.setProperty('--accent2','#0fa86a');r.style.setProperty('--border','#dde8e3');r.style.setProperty('--border2','#cdd8d3');r.style.setProperty('--text','#0f1c17');r.style.setProperty('--muted','#6b8578');r.style.setProperty('--muted2','#9ab3aa');}else{r.style.setProperty('--bg','#0b0f0c');r.style.setProperty('--panel','#111816');r.style.setProperty('--panel2','#161d1a');r.style.setProperty('--accent','#00ff88');r.style.setProperty('--accent2','#19c37d');r.style.setProperty('--border','#1c2a25');r.style.setProperty('--border2','#243530');r.style.setProperty('--text','#e6f2ec');r.style.setProperty('--muted','#8fa39a');r.style.setProperty('--muted2','#5c7068');}}
(()=>applyTheme(localStorage.getItem('tl_theme')||'dark'))();
window.addEventListener('message',e=>{
  if(e.data?.theme)applyTheme(e.data.theme);
  if(e.data?.type==='tz_plan'&&e.data.isPro!==undefined)userIsPro=e.data.isPro;
});

// ── State ──────────────────────────────────────────────────────
const jid = sessionStorage.getItem('tz_current_journal')
  || (()=>{try{return parent?.sessionStorage?.getItem('tz_current_journal');}catch(e){return null;}})();

let allTrades = [];      // raw trade objects (mapped via dbToTrade)
let displayItems = [];   // filtered view
let currentFilter = 'all';
let currentTradeId = null;
let modalImgBuffer = []; // [{id?, _previewUrl, data?}]
let lbImgs = [];
let lbIdx = 0;
let userIsPro = false;
let saveTimer = null;
let _saveIndicatorTimer = null;

// ── Helpers ───────────────────────────────────────────────────
function fmtPnl(v){const n=parseFloat(v);if(isNaN(n)||v==null||v==='')return null;return{str:(n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2),cls:n>0?'pos':n<0?'neg':''};}
function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}

const ALLOWED_IMG=['image/png','image/jpeg','image/jpg','image/gif','image/webp'];
const MAX_MB=5;
function validateImg(file){
  if(!ALLOWED_IMG.includes(file.type)){showToast('Only PNG, JPG, GIF, WebP allowed.','fa-solid fa-triangle-exclamation','r');return false;}
  if(file.size>MAX_MB*1024*1024){showToast(`Max ${MAX_MB}MB per image.`,'fa-solid fa-triangle-exclamation','r');return false;}
  return true;
}

// ── Boot ──────────────────────────────────────────────────────
(async()=>{
  if(!jid){
    document.getElementById('skelGrid').style.display='none';
    document.getElementById('notesGrid').style.display='';
    document.getElementById('notesGrid').innerHTML='<div class="empty-state"><div class="ei"><i class="fa-solid fa-note-sticky"></i></div><h3>No journal selected</h3><p>Open a journal from the dashboard first.</p></div>';
    document.body.style.visibility='visible';return;
  }
  try{userIsPro=parent?._userIsPro||false;}catch(e){}
  if(!userIsPro){const{data:{user}}=await db.auth.getUser();if(user){const p=await getProfile(user.id);userIsPro=p?.plan==='pro';}}

  const raw=await getTrades(jid);
  allTrades=raw.map(dbToTrade);
  // Resolve image URLs in background
  allTrades=await Promise.all(allTrades.map(async t=>{
    const imgs=await Promise.all((t.images||[]).map(async img=>{
      const url=img._previewUrl||img.data||(typeof getImageUrl==='function'?await getImageUrl(img):null);
      return{...img,_previewUrl:url};
    }));
    return{...t,images:imgs};
  }));

  document.getElementById('skelGrid').style.display='none';
  document.getElementById('notesGrid').style.display='';
  applyFilters();
  document.body.style.visibility='visible';

  // Subscribe to real-time changes from logs
  subscribeTrades(jid,async()=>{
    const r=await getTrades(jid);
    const newTrades=await Promise.all(r.map(dbToTrade).map(async t=>{
      const imgs=await Promise.all((t.images||[]).map(async img=>{
        const url=img._previewUrl||img.data||(typeof getImageUrl==='function'?await getImageUrl(img):null);
        return{...img,_previewUrl:url};
      }));
      return{...t,images:imgs};
    }));
    allTrades=newTrades;
    applyFilters();
    // If modal is open, refresh modal data
    if(currentTradeId&&document.getElementById('overlay').classList.contains('open')){
      const updated=allTrades.find(t=>t.id===currentTradeId);
      if(updated)_refreshModalMeta(updated);
    }
  });
})();

// ── Filter ────────────────────────────────────────────────────
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.fpill').forEach(b=>b.classList.toggle('active',b===btn));
  applyFilters();
}

function applyFilters(){
  const q=(document.getElementById('searchInp').value||'').toLowerCase().trim();
  let items=allTrades;

  // Only show trades that have at least a note or an image in the "All" filter
  if(currentFilter==='all'){items=items.filter(t=>(t.notes&&t.notes.trim())||(t.images&&t.images.length));}
  if(currentFilter==='has_note'){items=items.filter(t=>t.notes&&t.notes.trim());}
  if(currentFilter==='has_img'){items=items.filter(t=>t.images&&t.images.length>0);}
  if(currentFilter==='win'){items=items.filter(t=>parseFloat(t.pnl)>0);}
  if(currentFilter==='loss'){items=items.filter(t=>parseFloat(t.pnl)<0);}
  if(currentFilter==='long'){items=items.filter(t=>(t.position||'').toLowerCase()==='long');}
  if(currentFilter==='short'){items=items.filter(t=>(t.position||'').toLowerCase()==='short');}

  if(q){
    items=items.filter(t=>
      (t.pair||'').toLowerCase().includes(q)||
      (t.notes||'').toLowerCase().includes(q)||
      (t.strategy||[]).join(' ').toLowerCase().includes(q)||
      (t.timeframe||[]).join(' ').toLowerCase().includes(q)||
      (t.mood||[]).join(' ').toLowerCase().includes(q)||
      (t.date||'').includes(q)
    );
  }

  displayItems=items;
  renderGrid();
}

// ── Render grid ───────────────────────────────────────────────
function renderGrid(){
  const grid=document.getElementById('notesGrid');
  const total=displayItems.length;
  const allWithNotes=allTrades.filter(t=>(t.notes&&t.notes.trim())||(t.images&&t.images.length));
  document.getElementById('noteCount').textContent=allWithNotes.length+' note'+(allWithNotes.length!==1?'s':'');

  if(!total){
    grid.innerHTML=`<div class="empty-state">
      <div class="ei"><i class="fa-solid fa-note-sticky"></i></div>
      <h3>${currentFilter==='all'?'No notes yet':'No matches'}</h3>
      <p>${currentFilter==='all'
        ?'Open a trade in Logs, add notes or images, and they\'ll appear here.'
        :'Try a different filter or search term.'
      }</p>
    </div>`;
    return;
  }

  grid.innerHTML='';
  displayItems.forEach((t,i)=>{
    const card=buildCard(t,i);
    grid.appendChild(card);
  });
}

function buildCard(t,i){
  const el=document.createElement('div');
  el.className='nc';
  el.style.animationDelay=(i*0.03)+'s';
  el.onclick=()=>openModal(t.id);

  const imgs=t.images||[];
  const firstImg=imgs.find(img=>img._previewUrl);
  const pnl=fmtPnl(t.pnl);
  const tags=[...(t.strategy||[]),...(t.timeframe||[])].slice(0,3);

  el.innerHTML=`
    ${firstImg
      ?`<img class="nc-img" src="${firstImg._previewUrl}" alt="${esc(t.pair)}" loading="lazy">
        ${imgs.length>1?`<div class="nc-img-count"><i class="fa-solid fa-images" style="font-size:9px"></i>${imgs.length}</div>`:''}`
      :`<div class="nc-no-img"><i class="fa-solid fa-note-sticky"></i></div>`
    }
    <div class="nc-body">
      <div class="nc-pair">
        ${esc(t.pair||'—')}
        ${t.position?`<span class="nc-pos ${t.position.toLowerCase()}">${t.position}</span>`:''}
      </div>
      ${t.date?`<div class="nc-date"><i class="fa-solid fa-calendar" style="font-size:9px"></i>${esc(t.date)}</div>`:''}
      ${pnl?`<div class="nc-pnl ${pnl.cls}">${pnl.str}</div>`:''}
      ${t.notes&&t.notes.trim()?`<div class="nc-preview">${esc(t.notes.trim())}</div>`:''}
      ${tags.length?`<div class="nc-tags">${tags.map(tg=>`<span class="nc-tag">${esc(tg)}</span>`).join('')}</div>`:''}
    </div>`;
  return el;
}

// ── Modal ─────────────────────────────────────────────────────
async function openModal(id){
  const t=allTrades.find(x=>x.id===id);if(!t)return;
  currentTradeId=id;
  modalImgBuffer=[...(t.images||[]).filter(img=>img._previewUrl)];

  _refreshModalMeta(t);
  renderModalImgs();
  renderImgThumbs();
  document.getElementById('modalNote').value=t.notes||'';
  document.getElementById('saveStatus').textContent='';
  document.getElementById('saveStatus').className='autosave-status';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('imgActions').style.display='flex';
}

function _refreshModalMeta(t){
  const pnl=fmtPnl(t.pnl);
  document.getElementById('modalPair').textContent=t.pair||'Untitled Trade';

  const meta=[];
  if(t.date)meta.push(`<div class="meta-chip"><i class="fa-solid fa-calendar fa-xs"></i>${esc(t.date)}${t.time?` ${esc(t.time)}`:''}</div>`);
  if(t.position){const isL=t.position==='Long';meta.push(`<div class="meta-chip"><i class="fa-solid fa-arrow-${isL?'up':'down'} fa-xs" style="color:${isL?'var(--accent2)':'var(--red)'}"></i>${t.position}</div>`);}
  if(pnl)meta.push(`<div class="meta-chip ${pnl.cls}">${pnl.str}</div>`);
  if(t.r){const rv=parseFloat(t.r);meta.push(`<div class="meta-chip ${rv>=0?'pos':''}">${rv>=0?'+':''}${rv.toFixed(2)}R</div>`);}
  if(t.confidence)meta.push(`<div class="meta-chip amb"><i class="fa-solid fa-star fa-xs" style="color:var(--amber)"></i>${'★'.repeat(t.confidence)}</div>`);
  document.getElementById('modalMeta').innerHTML=meta.join('');

  const tags=[...(t.strategy||[]),...(t.timeframe||[]),...(t.mood||[])];
  document.getElementById('modalTags').innerHTML=tags.map(tg=>`<span class="mtag">${esc(tg)}</span>`).join('');
}

function renderModalImgs(){
  const strip=document.getElementById('imgStrip');
  const wrap=document.getElementById('modalImgs');
  const badge=document.getElementById('imgCountBadge');
  const imgs=modalImgBuffer.filter(img=>img._previewUrl);

  if(imgs.length){
    wrap.classList.add('has-imgs');
    strip.innerHTML=imgs.map((img,i)=>`<img class="strip-img" src="${img._previewUrl}" alt="" onclick="openLb(${i})" loading="lazy">`).join('');
    if(imgs.length>1){badge.style.display='block';badge.textContent=`${imgs.length} images`;}
    else{badge.style.display='none';}
  } else {
    wrap.classList.remove('has-imgs');
    strip.innerHTML='';
    badge.style.display='none';
  }
}

function renderImgThumbs(){
  const row=document.getElementById('imgThumbsRow');
  const cnt=document.getElementById('imgMgrCount');
  const imgs=modalImgBuffer.filter(img=>img._previewUrl);
  cnt.textContent=imgs.length?`(${imgs.length})`:'';
  row.innerHTML=imgs.map((img,i)=>`
    <div class="img-th" title="Click to view">
      <img src="${img._previewUrl}" alt="" onclick="openLb(${i})">
      <button class="rm-img" onclick="event.stopPropagation();removeModalImg(${i})"><i class="fa-solid fa-xmark"></i></button>
    </div>`).join('');
}

function removeModalImg(i){
  modalImgBuffer.splice(i,1);
  renderModalImgs();renderImgThumbs();
  triggerAutoSave();
}

function closeModal(){
  // Flush any pending save before closing
  if(saveTimer){clearTimeout(saveTimer);_doSave();}
  document.getElementById('overlay').classList.remove('open');
  currentTradeId=null;modalImgBuffer=[];
}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

// ── Note editing + auto-save ──────────────────────────────────
function onNoteInput(){
  setSaveStatus('saving','Saving…');
  triggerAutoSave();
}

function triggerAutoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>_doSave(),900);
}

async function _doSave(){
  if(!currentTradeId)return;
  const t=allTrades.find(x=>x.id===currentTradeId);if(!t)return;
  const newNote=document.getElementById('modalNote').value;
  t.notes=newNote;

  // Reconcile images: delete removed, add new
  try{
    const keepIds=new Set(modalImgBuffer.filter(i=>i.id).map(i=>i.id));
    for(const img of(t.images||[])){if(img.id&&!keepIds.has(img.id)){try{await deleteTradeImage(img.id);}catch(e){}}}
    const final=[];
    for(const img of modalImgBuffer){
      if(img.id){final.push(img);}
      else if(img._previewUrl){
        try{
          const{data:{user}}=await db.auth.getUser();
          const saved=await addTradeImage(user.id,currentTradeId,img._previewUrl);
          final.push({...img,id:saved.id,data:saved.data||img._previewUrl});
        }catch(e){final.push(img);}
      }
    }
    t.images=final;
    modalImgBuffer=[...final.map(img=>({...img,_previewUrl:img._previewUrl||img.data}))];

    await updateTrade(currentTradeId,t);
    setSaveStatus('saved','Saved');
    showSaveIndicator();
    // Update card in grid without full re-render
    _updateCardInGrid(t);
    // Notify parent logs page
    try{parent.postMessage({type:'tz_settings_updated'},'*');}catch(e){}
  }catch(e){
    setSaveStatus('err','Save failed');
    showToast('Auto-save failed: '+e.message,'fa-solid fa-circle-exclamation','r');
  }
}

function setSaveStatus(cls,msg){
  const el=document.getElementById('saveStatus');
  el.className='autosave-status'+(cls?' '+cls:'');
  el.innerHTML=cls==='saving'
    ?`<i class="fa-solid fa-circle-notch fa-spin" style="font-size:10px"></i> ${msg}`
    :cls==='saved'?`<i class="fa-solid fa-check" style="font-size:10px"></i> ${msg}`
    :cls==='err'?`<i class="fa-solid fa-triangle-exclamation" style="font-size:10px"></i> ${msg}`
    :msg;
}

function showSaveIndicator(){
  const el=document.getElementById('saveIndicator');
  el.classList.add('show');
  clearTimeout(_saveIndicatorTimer);
  _saveIndicatorTimer=setTimeout(()=>el.classList.remove('show'),2000);
}

function _updateCardInGrid(t){
  // Re-render the grid to reflect updated note/images
  const idx=displayItems.findIndex(x=>x.id===t.id);
  if(idx>-1){
    displayItems[idx]=t;
    const cards=document.getElementById('notesGrid').querySelectorAll('.nc');
    if(cards[idx]){
      const newCard=buildCard(t,idx);
      cards[idx].replaceWith(newCard);
    }
  }
}

// ── Image upload ──────────────────────────────────────────────
function triggerImgUpload(){document.getElementById('modalFileInp').click();}

function handleModalUpload(e){
  const files=[...e.target.files];
  files.forEach(f=>{
    if(!validateImg(f))return;
    if(!userIsPro&&modalImgBuffer.length>=1){showToast('Free plan: 1 image per trade.','fa-solid fa-lock','r');return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      modalImgBuffer.push({_previewUrl:ev.target.result});
      renderModalImgs();renderImgThumbs();triggerAutoSave();
    };
    reader.readAsDataURL(f);
  });
  e.target.value='';
}

// Paste support
document.addEventListener('paste',e=>{
  if(!document.getElementById('overlay').classList.contains('open'))return;
  if(document.activeElement===document.getElementById('modalNote'))return; // let note textarea handle text paste
  [...e.clipboardData.items].forEach(item=>{
    if(item.type.startsWith('image/')){
      const file=item.getAsFile();if(!file)return;
      if(!validateImg(file))return;
      if(!userIsPro&&modalImgBuffer.length>=1){showToast('Free plan: 1 image per trade.','fa-solid fa-lock','r');return;}
      const reader=new FileReader();
      reader.onload=ev=>{modalImgBuffer.push({_previewUrl:ev.target.result});renderModalImgs();renderImgThumbs();triggerAutoSave();};
      reader.readAsDataURL(file);
    }
  });
});

// ── Lightbox ──────────────────────────────────────────────────
function openLb(i){
  const imgs=modalImgBuffer.filter(img=>img._previewUrl);
  if(!imgs.length)return;
  lbImgs=imgs;lbIdx=i;
  _showLbImg();
  document.getElementById('lb').classList.add('open');
}
function _showLbImg(){
  document.getElementById('lbImg').src=lbImgs[lbIdx]._previewUrl||'';
  document.getElementById('lbPrev').style.display=lbIdx>0?'flex':'none';
  document.getElementById('lbNext').style.display=lbIdx<lbImgs.length-1?'flex':'none';
}
function lbNav(dir){lbIdx=Math.max(0,Math.min(lbImgs.length-1,lbIdx+dir));_showLbImg();}
function lbClick(e){if(e.target===document.getElementById('lb'))closeLb();}
function closeLb(){document.getElementById('lb').classList.remove('open');}
document.addEventListener('keydown',e=>{
  if(document.getElementById('lb').classList.contains('open')){
    if(e.key==='ArrowLeft')lbNav(-1);
    if(e.key==='ArrowRight')lbNav(1);
    if(e.key==='Escape')closeLb();
  } else if(document.getElementById('overlay').classList.contains('open')){
    if(e.key==='Escape')closeModal();
  }
});

// ── Toast ─────────────────────────────────────────────────────
let _tt;
function showToast(msg,icon='fa-solid fa-circle-check',cls=''){
  const t=document.getElementById('toast');
  document.getElementById('toastIcon').className=icon;
  document.getElementById('toastMsg').textContent=msg;
  t.className='show'+(cls?' '+cls:'');
  clearTimeout(_tt);
  _tt=setTimeout(()=>{t.className='';},3200);
}
</script>
</body>
</html>
