<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Gallery</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0f0c;--panel:#111816;--accent:#00ff88;--accent2:#19c37d;--border:#1c2a25;--text:#e6f2ec;--muted:#8fa39a}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;padding:20px}
.pw{max-width:1100px;margin:0 auto}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.ph h2{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600}
.cnt{font-size:12px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px}
.gc{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
.gc:hover{border-color:var(--accent2);transform:translateY(-2px)}
.gc-img{width:100%;height:128px;object-fit:cover;display:block;background:var(--bg)}
.gc-info{padding:10px}
.gc-pair{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;margin-bottom:3px}
.gc-date{font-size:11px;color:var(--muted);margin-bottom:5px}
.gc-pnl{font-size:12px;font-weight:600}.gc-pnl.pos{color:var(--accent)}.gc-pnl.neg{color:#ff5f6d}
.gc-notes{font-size:11px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{color:var(--muted);font-size:14px;text-align:center;padding:60px 0;grid-column:1/-1;line-height:1.8}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.lb.open{display:flex}
.lb-in{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;max-width:680px;width:100%;margin:auto}
.lb-img{width:100%;max-height:420px;object-fit:contain;background:#000;display:block}
.lb-body{padding:18px}
.lb-pair{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;margin-bottom:8px}
.lb-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.lb-meta span{font-size:12px;color:var(--muted)}
.lb-pnl{font-weight:600}.lb-pnl.pos{color:var(--accent)}.lb-pnl.neg{color:#ff5f6d}
.lb-strat{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.lb-tag{background:rgba(25,195,125,.12);color:var(--accent2);border-radius:4px;padding:2px 8px;font-size:11px}
.lb-notes{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap}
.lb-x{position:absolute;top:16px;right:18px;background:none;border:none;color:#fff;font-size:22px;cursor:pointer}
</style>
</head>
<body>
<div class="pw">
  <div class="ph"><h2>Trade Gallery</h2><span class="cnt" id="cnt">Loading…</span></div>
  <div class="grid" id="grid"></div>
</div>
<div class="lb" id="lb" onclick="closeLb(event)">
  <button class="lb-x" onclick="document.getElementById('lb').classList.remove('open')">✕</button>
  <div class="lb-in">
    <img class="lb-img" id="lbImg" src="" alt="">
    <div class="lb-body">
      <div class="lb-pair" id="lbPair">—</div>
      <div class="lb-meta"><span id="lbDate">—</span><span class="lb-pnl" id="lbPnl"></span><span id="lbPos"></span><span id="lbR"></span></div>
      <div class="lb-strat" id="lbStrat"></div>
      <div class="lb-notes" id="lbNotes"></div>
    </div>
  </div>
</div>
<script>
function applyTheme(t){const r=document.documentElement,dk=t==='dark'||(t==='system'&&!window.matchMedia('(prefers-color-scheme:light)').matches);if(!dk){r.style.setProperty('--bg','#f6faf8');r.style.setProperty('--panel','#ffffff');r.style.setProperty('--accent','#19c37d');r.style.setProperty('--border','#d9e5df');r.style.setProperty('--text','#0f1c17');r.style.setProperty('--muted','#6b8578');}else{r.style.setProperty('--bg','#0b0f0c');r.style.setProperty('--panel','#111816');r.style.setProperty('--accent','#00ff88');r.style.setProperty('--accent2','#19c37d');r.style.setProperty('--border','#1c2a25');r.style.setProperty('--text','#e6f2ec');r.style.setProperty('--muted','#8fa39a');}}
(()=>applyTheme(localStorage.getItem('tl_theme')||'dark'))();
const jid=sessionStorage.getItem('tz_current_journal')||parent?.sessionStorage?.getItem?.('tz_current_journal');
let items=[];
function fP(v){const n=parseFloat(v);if(isNaN(n))return'—';return(n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2);}
function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
(async()=>{
  if(!jid){document.getElementById('grid').innerHTML='<div class="empty">No journal selected.</div>';return;}
  const raw=await getTrades(jid);const trades=raw.map(dbToTrade);
  items=[];trades.forEach((t,ti)=>{(t.images||[]).forEach(img=>{items.push({imgData:img.data,pair:t.pair,date:t.date,pnl:t.pnl,position:t.position,notes:t.notes,strategy:t.strategy||[],timeframe:t.timeframe||[],r:t.r,tradeNum:ti+1});});});
  render();
})();
function render(){
  const g=document.getElementById('grid');document.getElementById('cnt').textContent=items.length+' image'+(items.length!==1?'s':'');
  if(!items.length){g.innerHTML='<div class="empty">No images yet.<br>Open trade notes and upload or paste images.</div>';return;}
  g.innerHTML=items.map((it,i)=>{const pnl=parseFloat(it.pnl)||0,cls=pnl>0?'pos':pnl<0?'neg':'';return`<div class="gc" onclick="openLb(${i})"><img class="gc-img" src="${it.imgData}" alt="${esc(it.pair)}"><div class="gc-info"><div class="gc-pair">${esc(it.pair)||'—'}</div><div class="gc-date">${it.date||'—'}</div><div class="gc-pnl ${cls}">${it.pnl!==''&&!isNaN(pnl)?fP(it.pnl):'—'}</div>${it.notes?`<div class="gc-notes">${esc(it.notes)}</div>`:''}<div style="font-size:10px;color:var(--border);margin-top:4px;font-style:italic">Trade #${it.tradeNum}</div></div></div>`;}).join('');
}
function openLb(i){const it=items[i],pnl=parseFloat(it.pnl)||0,cls=pnl>0?'pos':pnl<0?'neg':'';document.getElementById('lbImg').src=it.imgData;document.getElementById('lbPair').textContent=it.pair||'—';document.getElementById('lbDate').textContent=it.date||'—';const pe=document.getElementById('lbPnl');pe.textContent=it.pnl!==''&&!isNaN(pnl)?fP(it.pnl):'';pe.className='lb-pnl '+cls;document.getElementById('lbPos').textContent=it.position||'';document.getElementById('lbR').textContent=it.r?'R: '+it.r:'';document.getElementById('lbStrat').innerHTML=[...it.strategy,...it.timeframe].map(s=>`<span class="lb-tag">${esc(s)}</span>`).join('');document.getElementById('lbNotes').textContent=it.notes||'';document.getElementById('lb').classList.add('open');}
function closeLb(e){if(e.target===document.getElementById('lb'))document.getElementById('lb').classList.remove('open');}
</script>
</body>
</html>
