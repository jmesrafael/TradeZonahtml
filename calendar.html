<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Calendar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0f0c;--panel:#111816;--accent:#00ff88;--accent2:#19c37d;--border:#1c2a25;--text:#e6f2ec;--muted:#8fa39a}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;padding:20px}
.pw{max-width:900px;margin:0 auto}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ch h2{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600}
.nav-btns{display:flex;gap:6px}
.nb{background:var(--panel);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.nb:hover{border-color:var(--accent2);color:var(--text)}
.drow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.dlbl{text-align:center;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding:6px 0}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cd{background:var(--panel);border:1px solid var(--border);border-radius:8px;aspect-ratio:1/1;padding:6px 5px 5px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;flex-direction:column;align-items:stretch;overflow:hidden;min-width:0}
.cd:hover{border-color:var(--accent2);background:rgba(255,255,255,.02)}
.cd.empty{background:transparent;border-color:transparent;cursor:default}
.cd.today{border-color:var(--accent2)}
.cd.profit{border-left:3px solid var(--accent)}
.cd.loss{border-left:3px solid #ff5f6d}
.dn{font-size:11px;color:var(--muted);font-weight:500;line-height:1;flex-shrink:0;align-self:flex-start}
.cd.today .dn{color:var(--accent);font-weight:700}
.db{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:0;padding:2px 0}
.dc{font-size:10px;color:var(--muted);width:100%;text-align:center;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dp{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
.dp.pos{color:var(--accent)}.dp.neg{color:#ff5f6d}
.ms{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
.mc{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.mc .ml{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.mc .mv{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700}
.mc .mv.pos{color:var(--accent)}.mc .mv.neg{color:#ff5f6d}
.det{display:none;position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:100;background:var(--panel);border:1px solid var(--border);border-radius:12px;width:275px;padding:16px;box-shadow:0 12px 40px rgba(0,0,0,.5);max-height:70vh;overflow-y:auto}
.det.open{display:block}
.dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dh h3{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600}
.dx{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1}
.ti{border-bottom:1px solid var(--border);padding:8px 0}.ti:last-child{border-bottom:none}
.ti-top{display:flex;justify-content:space-between;margin-bottom:2px}
.ti-pair{font-weight:600;font-size:13px}
.ti-pnl{font-size:13px;font-weight:600}.ti-pnl.pos{color:var(--accent)}.ti-pnl.neg{color:#ff5f6d}
.ti-sub{font-size:11px;color:var(--muted)}
@media(max-width:520px){.ms{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="pw">
  <div class="ch"><h2 id="mlbl">—</h2><div class="nav-btns"><button class="nb" onclick="prev()">‹</button><button class="nb" onclick="goToday()">Today</button><button class="nb" onclick="next()">›</button></div></div>
  <div class="drow"><div class="dlbl">Sun</div><div class="dlbl">Mon</div><div class="dlbl">Tue</div><div class="dlbl">Wed</div><div class="dlbl">Thu</div><div class="dlbl">Fri</div><div class="dlbl">Sat</div></div>
  <div class="cgrid" id="cgrid"></div>
  <div class="ms">
    <div class="mc"><div class="ml">Trades</div><div class="mv" id="mT">—</div></div>
    <div class="mc"><div class="ml">Total PNL</div><div class="mv" id="mP">—</div></div>
    <div class="mc"><div class="ml">Win Rate</div><div class="mv" id="mW">—</div></div>
    <div class="mc"><div class="ml">Best Day</div><div class="mv pos" id="mB">—</div></div>
  </div>
</div>
<div class="det" id="det"><div class="dh"><h3 id="detDate">—</h3><button class="dx" onclick="closeDet()">✕</button></div><div id="detTrades"></div></div>
<script>
function applyTheme(t){const r=document.documentElement,dk=t==='dark'||(t==='system'&&!window.matchMedia('(prefers-color-scheme:light)').matches);if(!dk){r.style.setProperty('--bg','#f6faf8');r.style.setProperty('--panel','#ffffff');r.style.setProperty('--accent','#19c37d');r.style.setProperty('--accent2','#0fa86a');r.style.setProperty('--border','#d9e5df');r.style.setProperty('--text','#0f1c17');r.style.setProperty('--muted','#6b8578');}else{r.style.setProperty('--bg','#0b0f0c');r.style.setProperty('--panel','#111816');r.style.setProperty('--accent','#00ff88');r.style.setProperty('--accent2','#19c37d');r.style.setProperty('--border','#1c2a25');r.style.setProperty('--text','#e6f2ec');r.style.setProperty('--muted','#8fa39a');}}
(()=>applyTheme(localStorage.getItem('tl_theme')||'dark'))();
const jid=sessionStorage.getItem('tz_current_journal')||parent?.sessionStorage?.getItem?.('tz_current_journal');
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
let now=new Date(),vy=now.getFullYear(),vm=now.getMonth(),allTrades=[];
(async()=>{if(!jid)return;const raw=await getTrades(jid);allTrades=raw.map(dbToTrade);render();})();
function fP(v){const n=parseFloat(v);if(isNaN(n))return'—';return(n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2);}
function render(){
  document.getElementById('mlbl').textContent=MN[vm]+' '+vy;
  const grid=document.getElementById('cgrid'),tod=now.toISOString().split('T')[0],dm={};
  allTrades.forEach(t=>{if(!t.date)return;if(!dm[t.date])dm[t.date]=[];dm[t.date].push(t);});
  const first=new Date(vy,vm,1).getDay(),days=new Date(vy,vm+1,0).getDate();
  let cells='';for(let i=0;i<first;i++)cells+='<div class="cd empty"></div>';
  let mT=0,mP=0,mW=0,mV=0,bP=-Infinity,bS='—';
  for(let d=1;d<=days;d++){
    const ds=vy+'-'+String(vm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'),dt=dm[ds]||[],tot=dt.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0),isT=ds===tod;
    let ph='';if(dt.length){ph=`<div class="dp ${tot>=0?'pos':'neg'}">${fP(tot)}</div>`;mT+=dt.length;dt.forEach(t=>{const p=parseFloat(t.pnl);if(!isNaN(p)&&t.pnl!==''){mP+=p;mV++;if(p>0)mW++;}});if(tot>bP){bP=tot;bS=fP(tot);}}
    cells+=`<div class="cd ${isT?'today':''} ${dt.length?(tot>=0?'profit':'loss'):''}" onclick="showDet('${ds}')"><div class="dn">${d}</div>${dt.length?`<div class="db"><div class="dc">${dt.length} trade${dt.length>1?'s':''}</div>${ph}</div>`:''}</div>`;
  }
  grid.innerHTML=cells;
  const wr=mV?((mW/mV)*100):0;
  document.getElementById('mT').textContent=mT;
  const pEl=document.getElementById('mP');pEl.textContent=mV?fP(mP):'—';pEl.className='mv '+(mP>=0?'pos':'neg');
  document.getElementById('mW').textContent=mV?('%'+wr.toFixed(1)):'—';
  document.getElementById('mB').textContent=bP>-Infinity?bS:'—';
}
function showDet(ds){const dt=allTrades.filter(t=>t.date===ds);if(!dt.length)return;document.getElementById('detDate').textContent=ds;document.getElementById('detTrades').innerHTML=dt.map(t=>{const pnl=parseFloat(t.pnl)||0,cls=pnl>0?'pos':pnl<0?'neg':'',tags=[...(t.strategy||[]),...(t.timeframe||[])].join(' · ');return`<div class="ti"><div class="ti-top"><span class="ti-pair">${t.pair||'—'}</span><span class="ti-pnl ${cls}">${t.pnl!==''&&!isNaN(pnl)?fP(t.pnl):'—'}</span></div><div class="ti-sub">${t.position||''}${t.time?' · '+t.time:''}${tags?' · '+tags:''}</div></div>`;}).join('');document.getElementById('det').classList.add('open');}
function closeDet(){document.getElementById('det').classList.remove('open');}
function prev(){vm--;if(vm<0){vm=11;vy--;}closeDet();render();}
function next(){vm++;if(vm>11){vm=0;vy++;}closeDet();render();}
function goToday(){vy=now.getFullYear();vm=now.getMonth();closeDet();render();}
</script>
</body>
</html>
