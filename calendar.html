<!-- calendar.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Calendar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0f0c;--panel:#111816;--accent:#00ff88;--accent2:#19c37d;--border:#1c2a25;--text:#e6f2ec;--muted:#8fa39a}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
body{visibility:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;padding:18px;min-height:100vh}
.pw{max-width:860px;margin:0 auto}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.cal-hdr h2{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px}
.nav-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.nav-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:13px}
.nav-btn:hover{border-color:var(--accent2);color:var(--text)}
.month-lbl{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;min-width:130px;text-align:center}
/* skeleton */
.skel-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.dow-hdr-skel{display:grid;grid-template-columns:repeat(7,1fr);background:var(--panel);border-bottom:1px solid var(--border);height:36px}
.grid-skel{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.cell-skel{height:72px;background:linear-gradient(90deg,var(--panel) 25%,rgba(255,255,255,.04) 50%,var(--panel) 75%);background-size:600px 100%;animation:shimmer 1.4s infinite}
/* calendar */
.cal-wrap{display:none;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.dow-hdr{display:grid;grid-template-columns:repeat(7,1fr);background:var(--panel);border-bottom:1px solid var(--border)}
.dow-cell{padding:9px 8px;text-align:center;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.cal-day{background:var(--panel);min-height:72px;padding:7px 8px;cursor:pointer;transition:background .15s;position:relative;display:flex;flex-direction:column}
.cal-day:hover{background:rgba(255,255,255,.04)}
.cal-day.other-month{opacity:.35}
.cal-day.today .dn{color:var(--accent);font-weight:700}
.cal-day.locked{cursor:default;opacity:.45}
.cal-day.locked:hover{background:var(--panel)}
.dn{font-size:12px;color:var(--muted);margin-bottom:5px;line-height:1}
.day-pnl{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700}
.day-pnl.pos{color:var(--accent)}.day-pnl.neg{color:#ff5f6d}.day-pnl.be{color:var(--muted)}
.day-cnt{font-size:10px;color:var(--muted);margin-top:2px}
.day-bar{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 2px 2px}
.day-bar.pos{background:var(--accent)}.day-bar.neg{background:#ff5f6d}
.sum-bar{display:flex;flex-wrap:wrap;gap:10px;padding:12px 14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
.sum-item{display:flex;flex-direction:column;gap:2px;min-width:72px}
.sum-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.sum-val{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700}
.sum-val.pos{color:var(--accent)}.sum-val.neg{color:#ff5f6d}
.day-panel{display:none;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:14px}
.day-panel.show{display:block}
.dp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dp-hdr h3{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600}
.dp-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:3px;transition:color .15s}
.dp-close:hover{color:var(--text)}
.dp-trade{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg);border-radius:7px;margin-bottom:6px;font-size:13px;flex-wrap:wrap;gap:6px}
.dp-trade:last-child{margin-bottom:0}
.dp-pair{font-weight:600;font-family:'Space Grotesk',sans-serif}
.dp-pos{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600}
.dp-pos.long{background:rgba(0,255,136,.12);color:var(--accent2)}
.dp-pos.short{background:rgba(255,95,109,.1);color:#ff5f6d}
.dp-pnl{font-family:'Space Grotesk',sans-serif;font-weight:700}
.dp-pnl.pos{color:var(--accent)}.dp-pnl.neg{color:#ff5f6d}
.free-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.3);border-radius:9px;margin-bottom:14px;font-size:12px;color:var(--muted);line-height:1.5}
.free-banner i{color:#f59e0b;flex-shrink:0}
.free-banner a{color:var(--accent2);text-decoration:none;font-weight:600}
@media(max-width:480px){.cal-day{min-height:54px;padding:5px 6px}.day-pnl{font-size:11px}.dn{font-size:11px}}
</style>
</head>
<body>
<div class="pw">
  <div class="cal-hdr">
    <h2><i class="fa-solid fa-calendar-days" style="color:var(--accent2)"></i>Trade Calendar</h2>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevMonth()"><i class="fa-solid fa-chevron-left"></i></button>
      <span class="month-lbl" id="monthLbl">—</span>
      <button class="nav-btn" onclick="nextMonth()"><i class="fa-solid fa-chevron-right"></i></button>
      <button class="nav-btn" onclick="goToday()" style="width:auto;padding:0 10px;font-size:11px;font-weight:600">Today</button>
    </div>
  </div>

  <div class="free-banner" id="freeBanner" style="display:none">
    <i class="fa-solid fa-clock-rotate-left"></i>
    <span>Free plan shows the last 90 days. <a href="/subscription">Upgrade to Pro</a> for full history.</span>
  </div>

  <div class="sum-bar" id="sumBar" style="display:none">
    <div class="sum-item"><div class="sum-lbl">Month PNL</div><div class="sum-val" id="sumPnl">—</div></div>
    <div class="sum-item"><div class="sum-lbl">Trades</div><div class="sum-val" id="sumTrades">0</div></div>
    <div class="sum-item"><div class="sum-lbl">Win Days</div><div class="sum-val pos" id="sumWin">0</div></div>
    <div class="sum-item"><div class="sum-lbl">Loss Days</div><div class="sum-val neg" id="sumLoss">0</div></div>
    <div class="sum-item"><div class="sum-lbl">Win Rate</div><div class="sum-val" id="sumWR">—</div></div>
    <div class="sum-item"><div class="sum-lbl">Best Day</div><div class="sum-val pos" id="sumBest">—</div></div>
    <div class="sum-item"><div class="sum-lbl">Worst Day</div><div class="sum-val neg" id="sumWorst">—</div></div>
  </div>

  <!-- Skeleton (no DOW text — built by JS) -->
  <div class="skel-wrap" id="skelWrap">
    <div class="dow-hdr-skel" id="skelDow"></div>
    <div class="grid-skel" id="skelGrid"></div>
  </div>

  <!-- Real calendar (DOW header filled by JS — never template literals in HTML) -->
  <div class="cal-wrap" id="calWrap">
    <div class="dow-hdr" id="calDow"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="day-panel" id="dayPanel">
    <div class="dp-hdr"><h3 id="dpTitle">—</h3><button class="dp-close" onclick="closePanel()"><i class="fa-solid fa-xmark"></i></button></div>
    <div id="dpTrades"></div>
  </div>

  <!-- Ad slot — free users only -->
  <div id="calAdSlot" style="display:none;margin-top:18px;background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden">
    <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:5px 12px 0;opacity:.5">Advertisement</div>
    <div style="min-height:72px;display:flex;align-items:center;justify-content:center;padding:10px 16px">
      <ins class="adsbygoogle" style="display:block;width:100%;min-height:72px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="XXXXXXXXXX" data-ad-format="horizontal" data-full-width-responsive="true"></ins>
    </div>
  </div>
  <div id="calUpgradeNudge" style="display:none;margin-top:10px;padding:10px 14px;background:rgba(0,255,136,.04);border:1px solid rgba(0,255,136,.15);border-radius:9px;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--muted)"><strong style="color:var(--text)">Remove ads + unlock full history</strong> — upgrade to Pro.</span>
    <a href="/subscription" style="background:var(--accent);color:#0b0f0c;border:none;border-radius:6px;padding:6px 12px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap">Upgrade to Pro</a>
  </div>
</div>

<script>
function applyTheme(t){const r=document.documentElement,dk=t==='dark'||(t==='system'&&!window.matchMedia('(prefers-color-scheme:light)').matches);if(!dk){r.style.setProperty('--bg','#f4f7f5');r.style.setProperty('--panel','#ffffff');r.style.setProperty('--accent','#19c37d');r.style.setProperty('--accent2','#0fa86a');r.style.setProperty('--border','#dde8e3');r.style.setProperty('--text','#0f1c17');r.style.setProperty('--muted','#6b8578');}else{r.style.setProperty('--bg','#0b0f0c');r.style.setProperty('--panel','#111816');r.style.setProperty('--accent','#00ff88');r.style.setProperty('--accent2','#19c37d');r.style.setProperty('--border','#1c2a25');r.style.setProperty('--text','#e6f2ec');r.style.setProperty('--muted','#8fa39a');}}
(()=>applyTheme(localStorage.getItem('tl_theme')||'dark'))();
window.addEventListener('message',e=>{
  if(e.data?.theme)applyTheme(e.data.theme);
  if(e.data?.type==='tz_plan'&&typeof e.data.isPro!=='undefined'){userIsPro=e.data.isPro;document.getElementById('freeBanner').style.display=userIsPro?'none':'flex';}
});

const jid=sessionStorage.getItem('tz_current_journal');
let allTrades=[],curYear=new Date().getFullYear(),curMonth=new Date().getMonth(),userIsPro=false;
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

// DOW labels array — used ONLY in JS to build DOM nodes, never pasted as template literals into HTML
const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function buildDowHeader(id){
  // Builds the day-of-week header purely via DOM API
  const el=document.getElementById(id);
  if(!el)return;
  el.innerHTML='';
  DOW.forEach(function(label){
    var cell=document.createElement('div');
    cell.className='dow-cell';
    cell.textContent=label;
    el.appendChild(cell);
  });
}

function buildSkelDow(){
  var el=document.getElementById('skelDow');
  if(!el)return;
  DOW.forEach(function(){
    var c=document.createElement('div');
    c.style.cssText='height:100%;background:var(--panel)';
    el.appendChild(c);
  });
}

function buildSkelGrid(){
  var el=document.getElementById('skelGrid');
  if(!el)return;
  for(var i=0;i<35;i++){
    var c=document.createElement('div');
    c.className='cell-skel';
    el.appendChild(c);
  }
}

function fP(v){var n=parseFloat(v);if(isNaN(n))return'';return(n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2);}
function isLocked(dateStr){if(userIsPro)return false;var d=new Date(dateStr+'T12:00:00'),cut=new Date();cut.setDate(cut.getDate()-90);return d<cut;}

(async function(){
  buildDowHeader('skelDow');
  buildDowHeader('calDow');
  buildSkelGrid();
  if(!jid)return;
  try{userIsPro=parent&&parent._userIsPro||false;}catch(e){}
  if(!userIsPro){
    var res=await db.auth.getUser();
    if(res.data&&res.data.user){var p=await getProfile(res.data.user.id);userIsPro=(p&&p.plan==='pro')||false;}
  }
  if(!userIsPro)document.getElementById('freeBanner').style.display='flex';
  var raw=await getTrades(jid);
  allTrades=raw.map(dbToTrade);
  document.getElementById('skelWrap').style.display='none';
  document.getElementById('calWrap').style.display='block';
  renderMonth();
  // Show ad for free users
  if(!userIsPro){
    document.getElementById('calAdSlot').style.display='block';
    document.getElementById('calUpgradeNudge').style.display='flex';
    try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
  }
  document.body.style.visibility='visible';
})();

function renderMonth(){
  document.getElementById('monthLbl').textContent=MONTHS[curMonth]+' '+curYear;
  var firstDay=new Date(curYear,curMonth,1);
  var lastDay=new Date(curYear,curMonth+1,0);
  var startDow=firstDay.getDay()-1;if(startDow<0)startDow=6;
  // Group by day
  var dayMap={};
  allTrades.forEach(function(t){
    if(!t.date)return;
    var parts=t.date.split('-').map(Number);
    if(parts[0]===curYear&&parts[1]-1===curMonth){
      if(!dayMap[parts[2]])dayMap[parts[2]]=[];
      dayMap[parts[2]].push(t);
    }
  });
  var today=new Date();
  var calGrid=document.getElementById('calGrid');
  calGrid.innerHTML='';
  var monthPnl=0,tradeCnt=0,winDays=0,lossDays=0,bestDay=null,worstDay=null,dayPnls={};
  Object.keys(dayMap).forEach(function(day){
    var trades=dayMap[day];
    var dt=trades.filter(function(t){return t.pnl!==''&&!isNaN(parseFloat(t.pnl));}).reduce(function(s,t){return s+parseFloat(t.pnl);},0);
    dayPnls[day]=dt;monthPnl+=dt;tradeCnt+=trades.length;
    if(dt>0)winDays++;else if(dt<0)lossDays++;
    if(bestDay===null||dt>bestDay)bestDay=dt;
    if(worstDay===null||dt<worstDay)worstDay=dt;
  });
  var totalCells=Math.ceil((startDow+lastDay.getDate())/7)*7;
  for(var i=0;i<totalCells;i++){
    var dayNum=i-startDow+1;
    var inMonth=dayNum>=1&&dayNum<=lastDay.getDate();
    var padM=String(curMonth+1).padStart(2,'0'),padD=String(dayNum).padStart(2,'0');
    var dateStr=curYear+'-'+padM+'-'+padD;
    var isToday=inMonth&&dayNum===today.getDate()&&curMonth===today.getMonth()&&curYear===today.getFullYear();
    var locked=inMonth&&isLocked(dateStr);
    var hasTrades=inMonth&&dayMap[dayNum]&&dayMap[dayNum].length>0;
    var dayPnl=hasTrades?dayPnls[dayNum]:null;
    var cell=document.createElement('div');
    var cls='cal-day';
    if(!inMonth)cls+=' other-month';
    if(isToday)cls+=' today';
    if(locked)cls+=' locked';
    cell.className=cls;
    if(inMonth){
      var dn=document.createElement('span');dn.className='dn';dn.textContent=String(dayNum);cell.appendChild(dn);
      if(locked){
        var lk=document.createElement('span');lk.style.cssText='font-size:9px;color:var(--muted);opacity:.5';
        var li=document.createElement('i');li.className='fa-solid fa-lock';li.style.cssText='font-size:8px;margin-right:3px';
        lk.appendChild(li);lk.appendChild(document.createTextNode('Pro'));cell.appendChild(lk);
      } else if(hasTrades){
        var pe=document.createElement('span');pe.className='day-pnl '+(dayPnl>0?'pos':dayPnl<0?'neg':'be');pe.textContent=fP(dayPnl)||'—';cell.appendChild(pe);
        var ce=document.createElement('span');ce.className='day-cnt';ce.textContent=dayMap[dayNum].length+' trade'+(dayMap[dayNum].length>1?'s':'');cell.appendChild(ce);
        if(dayPnl!==0){var bar=document.createElement('div');bar.className='day-bar '+(dayPnl>0?'pos':'neg');cell.appendChild(bar);}
        (function(dn2,ds2,tr2){cell.addEventListener('click',function(){showDayPanel(dn2,ds2,tr2);});})(dayNum,dateStr,dayMap[dayNum]);
      }
    }
    calGrid.appendChild(cell);
  }
  // Summary
  if(tradeCnt>0){
    document.getElementById('sumBar').style.display='flex';
    var wr=(winDays+lossDays)>0?(winDays/(winDays+lossDays)*100).toFixed(0)+'%':'—';
    var ps=document.getElementById('sumPnl');ps.textContent=fP(monthPnl)||'—';ps.className='sum-val '+(monthPnl>0?'pos':monthPnl<0?'neg':'');
    document.getElementById('sumTrades').textContent=tradeCnt;
    document.getElementById('sumWin').textContent=winDays;
    document.getElementById('sumLoss').textContent=lossDays;
    document.getElementById('sumWR').textContent=wr;
    document.getElementById('sumBest').textContent=bestDay!==null?fP(bestDay):'—';
    document.getElementById('sumWorst').textContent=worstDay!==null?fP(worstDay):'—';
  } else {
    document.getElementById('sumBar').style.display='none';
  }
  closePanel();
}

function showDayPanel(dayNum,dateStr,trades){
  var d=new Date(dateStr+'T12:00:00');
  document.getElementById('dpTitle').textContent=d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var dayPnl=trades.filter(function(t){return t.pnl!==''&&!isNaN(parseFloat(t.pnl));}).reduce(function(s,t){return s+parseFloat(t.pnl);},0);
  var container=document.getElementById('dpTrades');container.innerHTML='';
  // Summary
  var sum=document.createElement('div');sum.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)';
  var sc=document.createElement('span');sc.style.cssText='font-size:12px;color:var(--muted)';sc.textContent=trades.length+' trade'+(trades.length>1?'s':'');
  var sp=document.createElement('span');sp.style.cssText='font-family:Space Grotesk,sans-serif;font-size:14px;font-weight:700;color:'+(dayPnl>0?'var(--accent)':dayPnl<0?'#ff5f6d':'var(--muted)');sp.textContent=fP(dayPnl)||'—';
  sum.appendChild(sc);sum.appendChild(sp);container.appendChild(sum);
  trades.forEach(function(t){
    var row=document.createElement('div');row.className='dp-trade';
    var left=document.createElement('div');left.style.cssText='display:flex;align-items:center;gap:8px;flex-wrap:wrap';
    var pair=document.createElement('span');pair.className='dp-pair';pair.textContent=t.pair||'—';
    var pos=document.createElement('span');pos.className='dp-pos '+((t.position||'Long').toLowerCase());pos.textContent=t.position||'Long';
    left.appendChild(pair);left.appendChild(pos);
    (t.strategy||[]).forEach(function(s){var tag=document.createElement('span');tag.style.cssText='font-size:10px;background:rgba(25,195,125,.1);color:var(--accent2);border-radius:4px;padding:1px 6px';tag.textContent=s;left.appendChild(tag);});
    var right=document.createElement('div');right.style.cssText='display:flex;align-items:center;gap:10px';
    var time=document.createElement('span');time.style.cssText='font-size:11px;color:var(--muted)';time.textContent=t.time||'';
    var pnlN=parseFloat(t.pnl);var pnlEl=document.createElement('span');pnlEl.className='dp-pnl '+(pnlN>0?'pos':pnlN<0?'neg':'');pnlEl.textContent=fP(t.pnl)||'—';
    right.appendChild(time);right.appendChild(pnlEl);
    if(t.r){var rEl=document.createElement('span');rEl.style.cssText='font-size:11px;color:'+(parseFloat(t.r)>0?'var(--accent2)':'#ff5f6d');rEl.textContent=(parseFloat(t.r)>0?'+':'')+parseFloat(t.r).toFixed(2)+'R';right.appendChild(rEl);}
    row.appendChild(left);row.appendChild(right);container.appendChild(row);
  });
  document.getElementById('dayPanel').classList.add('show');
}
function closePanel(){document.getElementById('dayPanel').classList.remove('show');}
function prevMonth(){curMonth--;if(curMonth<0){curMonth=11;curYear--;}renderMonth();}
function nextMonth(){curMonth++;if(curMonth>11){curMonth=0;curYear++;}renderMonth();}
function goToday(){curYear=new Date().getFullYear();curMonth=new Date().getMonth();renderMonth();}
</script>
</body>
</html>
