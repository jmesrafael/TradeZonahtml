<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0f0c;--panel:#111816;--accent:#00ff88;--accent2:#19c37d;--border:#1c2a25;--text:#e6f2ec;--muted:#8fa39a}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;padding:20px}
.pw{max-width:1100px;margin:0 auto}
.sr{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px;margin-bottom:18px}
.sc{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px}
.sc .sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.sc .sv{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600}
.sc .sv.pos{color:var(--accent)}.sc .sv.neg{color:#ff5f6d}
.cb{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
.cb h3{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px}
.c2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
canvas{max-height:190px}
.stk{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.skc{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.skc .sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.skc .sv{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700}
.skc .sv.win{color:var(--accent)}.skc .sv.loss{color:#ff5f6d}
.skc .ss{font-size:11px;color:var(--muted);margin-top:3px}
.bt{width:100%;border-collapse:collapse}
.bt th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.bt td{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--border)}
.bt tr:last-child td{border-bottom:none}
.empty{color:var(--muted);font-size:14px;text-align:center;padding:60px 0;line-height:1.8}
@media(max-width:600px){.c2{grid-template-columns:1fr}.stk{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="pw" id="root"><div class="empty">Loading analytics…</div></div>
<script>
function applyTheme(t){const r=document.documentElement,dk=t==='dark'||(t==='system'&&!window.matchMedia('(prefers-color-scheme:light)').matches);if(!dk){r.style.setProperty('--bg','#f6faf8');r.style.setProperty('--panel','#ffffff');r.style.setProperty('--accent','#19c37d');r.style.setProperty('--border','#d9e5df');r.style.setProperty('--text','#0f1c17');r.style.setProperty('--muted','#6b8578');}else{r.style.setProperty('--bg','#0b0f0c');r.style.setProperty('--panel','#111816');r.style.setProperty('--accent','#00ff88');r.style.setProperty('--accent2','#19c37d');r.style.setProperty('--border','#1c2a25');r.style.setProperty('--text','#e6f2ec');r.style.setProperty('--muted','#8fa39a');}}
(()=>applyTheme(localStorage.getItem('tl_theme')||'dark'))();
const jid=sessionStorage.getItem('tz_current_journal')||parent?.sessionStorage?.getItem?.('tz_current_journal');
function fP(v){const n=parseFloat(v);if(isNaN(n))return'—';return(n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2);}
function fPct(v){return'%'+parseFloat(v).toFixed(1);}
(async()=>{
  if(!jid){document.getElementById('root').innerHTML='<div class="empty">No journal selected.</div>';return;}
  const raw=await getTrades(jid);const trades=raw.map(dbToTrade);const settings=await getJournalSettings(jid);const mc=settings?.mood_colors||{};
  const isL=localStorage.getItem('tl_theme')==='light';const accent=isL?'#19c37d':'#00ff88';const tc=isL?'#6b8578':'#8fa39a';const gc=isL?'#d9e5df':'#1c2a25';
  Chart.defaults.color=tc;Chart.defaults.borderColor=gc;
  if(!trades.length){document.getElementById('root').innerHTML='<div class="empty">No trades yet.</div>';return;}
  document.getElementById('root').innerHTML=`
    <div class="sr" id="sr"></div><div class="stk" id="stk"></div>
    <div class="cb"><h3>Equity Curve</h3><canvas id="eq"></canvas></div>
    <div class="c2"><div class="cb"><h3>Win / Loss</h3><canvas id="wl"></canvas></div><div class="cb"><h3>Strategy PNL</h3><canvas id="st"></canvas></div></div>
    <div class="cb"><h3>Timeframe Breakdown</h3><table class="bt"><thead><tr><th>Timeframe</th><th>Trades</th><th>Wins</th><th>Win Rate</th><th>Total PNL</th></tr></thead><tbody id="tfb"></tbody></table></div>
    <div class="c2"><div class="cb"><h3>Mood Distribution</h3><canvas id="md"></canvas></div><div class="cb"><h3>Mood vs Performance</h3><table class="bt"><thead><tr><th>Mood</th><th>Trades</th><th>Win Rate</th><th>Avg PNL</th></tr></thead><tbody id="mdb"></tbody></table></div></div>
    <div class="cb"><h3>Hour Heatmap</h3><canvas id="hh"></canvas></div>
    <div class="c2"><div class="cb"><h3>Best Hours (Avg PNL)</h3><canvas id="hp"></canvas></div><div class="cb"><h3>Time of Day</h3><table class="bt"><thead><tr><th>Hour</th><th>Trades</th><th>Wins</th><th>Win Rate</th><th>Avg PNL</th></tr></thead><tbody id="tb"></tbody></table></div></div>
    <div class="c2"><div class="cb"><h3>Long vs Short</h3><canvas id="ls"></canvas></div><div class="cb"><h3>Most Traded Pair</h3><div id="pb"></div></div></div>
    <div class="cb"><h3>Trades by Day of Week</h3><canvas id="dow"></canvas></div>`;
  const vld=trades.filter(t=>t.pnl!==''&&!isNaN(parseFloat(t.pnl))),wins=vld.filter(t=>parseFloat(t.pnl)>0),losses=vld.filter(t=>parseFloat(t.pnl)<0),be=vld.filter(t=>parseFloat(t.pnl)===0),total=vld.reduce((s,t)=>s+parseFloat(t.pnl),0),rv=trades.filter(t=>t.r&&!isNaN(parseFloat(t.r))).map(t=>parseFloat(t.r)),avgR=rv.length?rv.reduce((a,b)=>a+b,0)/rv.length:0,wr=vld.length?wins.length/vld.length*100:0;
  let mxW=0,mxL=0,cW=0,cL=0;vld.forEach(t=>{const p=parseFloat(t.pnl);if(p>0){cW++;cL=0;if(cW>mxW)mxW=cW;}else if(p<0){cL++;cW=0;if(cL>mxL)mxL=cL;}else{cW=0;cL=0;}});
  document.getElementById('sr').innerHTML=[{l:'Total PNL',v:fP(total),c:total>=0?'pos':'neg'},{l:'Win Rate',v:fPct(wr),c:''},{l:'Wins',v:wins.length,c:'pos'},{l:'Losses',v:losses.length,c:'neg'},{l:'Trades',v:trades.length,c:''},{l:'Avg R',v:(avgR>=0?'+':'')+avgR.toFixed(2)+'R',c:avgR>=0?'pos':'neg'},{l:'Best',v:vld.length?fP(Math.max(...vld.map(t=>parseFloat(t.pnl)))):'—',c:'pos'},{l:'Worst',v:vld.length?fP(Math.min(...vld.map(t=>parseFloat(t.pnl)))):'—',c:'neg'}].map(s=>`<div class="sc"><div class="sl">${s.l}</div><div class="sv ${s.c}">${s.v}</div></div>`).join('');
  document.getElementById('stk').innerHTML=`<div class="skc"><div class="sl">Best Win Streak</div><div class="sv win">${mxW}</div><div class="ss">consecutive wins</div></div><div class="skc"><div class="sl">Best Loss Streak</div><div class="sv loss">${mxL}</div><div class="ss">consecutive losses</div></div>`;
  const srt=[...vld].sort((a,b)=>(a.date||'').localeCompare(b.date||''));let eq=0;const eqD=srt.map(t=>{eq+=parseFloat(t.pnl);return+eq.toFixed(2);});
  new Chart(document.getElementById('eq'),{type:'line',data:{labels:srt.map(t=>t.date),datasets:[{data:eqD,borderColor:accent,backgroundColor:accent+'18',fill:true,tension:.35,pointRadius:3,pointBackgroundColor:accent}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:10}},y:{}}}});
  new Chart(document.getElementById('wl'),{type:'doughnut',data:{labels:['Wins','Losses','BE'],datasets:[{data:[wins.length,losses.length,be.length],backgroundColor:[accent,'#ff5f6d','#8fa39a55'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{padding:14,boxWidth:10}}},cutout:'62%'}});
  const sm={};trades.forEach(t=>(t.strategy||[]).forEach(s=>{if(!sm[s])sm[s]=0;sm[s]+=(parseFloat(t.pnl)||0);}));const sl=Object.keys(sm);if(sl.length){const sp=sl.map(s=>+sm[s].toFixed(2));new Chart(document.getElementById('st'),{type:'bar',data:{labels:sl,datasets:[{data:sp,backgroundColor:sp.map(v=>v>=0?accent+'cc':'#ff5f6dcc'),borderRadius:5}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{},y:{}}}});}
  const tm={};trades.forEach(t=>(t.timeframe||[]).forEach(tf=>{if(!tm[tf])tm[tf]={w:0,tot:0,pnl:0};tm[tf].tot++;const p=parseFloat(t.pnl)||0;if(p>0)tm[tf].w++;tm[tf].pnl+=p;}));document.getElementById('tfb').innerHTML=Object.keys(tm).length?Object.keys(tm).map(tf=>{const d=tm[tf],w2=d.tot?(d.w/d.tot*100).toFixed(1):'0';return`<tr><td><strong>${tf}</strong></td><td>${d.tot}</td><td>${d.w}</td><td>${fPct(w2)}</td><td style="color:${d.pnl>=0?'var(--accent)':'#ff5f6d'}">${fP(d.pnl)}</td></tr>`;}).join(''):'<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:18px">No timeframe data.</td></tr>';
  const mm={};trades.forEach(t=>(t.mood||[]).forEach(m=>{if(!mm[m])mm[m]={tot:0,wins:0,pnl:0};mm[m].tot++;const p=parseFloat(t.pnl)||0;if(p>0)mm[m].wins++;mm[m].pnl+=p;}));const mk=Object.keys(mm);const MF=['#b39ddb','#81c784','#64b5f6','#ffb74d','#e57373','#f06292','#4db6ac','#aed581'];if(mk.length){new Chart(document.getElementById('md'),{type:'doughnut',data:{labels:mk,datasets:[{data:mk.map(m=>mm[m].tot),backgroundColor:mk.map((m,i)=>mc[m]||(MF[i%MF.length])),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{padding:12,boxWidth:10}}},cutout:'55%'}});document.getElementById('mdb').innerHTML=mk.map(m=>{const d=mm[m],w=d.tot?(d.wins/d.tot*100).toFixed(1):'0',avg=d.tot?d.pnl/d.tot:0;return`<tr><td><strong>${m}</strong></td><td>${d.tot}</td><td>${fPct(w)}</td><td style="color:${avg>=0?'var(--accent)':'#ff5f6d'}">${fP(avg)}</td></tr>`;}).join('');}
  const longs=trades.filter(t=>t.position==='Long').length,shorts=trades.filter(t=>t.position==='Short').length;new Chart(document.getElementById('ls'),{type:'doughnut',data:{labels:['Long','Short'],datasets:[{data:[longs,shorts],backgroundColor:['#00ff88cc','#ff5f6dcc'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{padding:14,boxWidth:10}}},cutout:'60%'}});
  const pc={};trades.forEach(t=>{if(t.pair)pc[t.pair]=(pc[t.pair]||0)+1;});const pe=Object.entries(pc).sort((a,b)=>b[1]-a[1]);const mx=pe[0]?pe[0][1]:1;document.getElementById('pb').innerHTML=pe.slice(0,8).map(([p,c])=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="font-weight:600">${p}</span><span style="color:var(--muted)">${c} trade${c>1?'s':''}</span></div><div style="height:5px;background:var(--border);border-radius:3px"><div style="height:5px;width:${(c/mx*100).toFixed(0)}%;background:var(--accent);border-radius:3px"></div></div></div>`).join('')||'<span style="color:var(--muted);font-size:13px">No pair data.</span>';
  const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],dc=[0,0,0,0,0,0,0];trades.forEach(t=>{if(!t.date)return;const d=new Date(t.date+'T12:00:00');dc[d.getDay()===0?6:d.getDay()-1]++;});new Chart(document.getElementById('dow'),{type:'bar',data:{labels:DOW,datasets:[{data:dc,backgroundColor:dc.map(v=>v>0?accent+'cc':gc),borderRadius:6,barThickness:32}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{stepSize:1}}}}});
  const twt=trades.filter(t=>t.time&&t.time.includes(':')),hm={};twt.forEach(t=>{const h=parseInt(t.time.split(':')[0],10);if(!hm[h])hm[h]={tot:0,wins:0,pnl:0};hm[h].tot++;const p=parseFloat(t.pnl)||0;if(p>0)hm[h].wins++;hm[h].pnl+=p;});function fH(h){if(h===0)return'12 AM';if(h===12)return'12 PM';return h<12?h+' AM':(h-12)+' PM';}const hl=Array.from({length:24},(_,i)=>fH(i)),hc=Array.from({length:24},(_,i)=>(hm[i]||{tot:0}).tot),ha=Array.from({length:24},(_,i)=>{const d=hm[i];return(!d||!d.tot)?0:+(d.pnl/d.tot).toFixed(2);});if(twt.length){new Chart(document.getElementById('hh'),{type:'bar',data:{labels:hl,datasets:[{data:hc,backgroundColor:hc.map(v=>v>0?accent+'cc':gc),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:true,maxBarThickness:28,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:24,font:{size:10}}},y:{ticks:{stepSize:1}}}}});new Chart(document.getElementById('hp'),{type:'bar',data:{labels:hl,datasets:[{data:ha,backgroundColor:ha.map(v=>v>0?accent+'cc':v<0?'#ff5f6dcc':gc),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:true,maxBarThickness:28,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:24,font:{size:10}}},y:{}}}});document.getElementById('tb').innerHTML=Object.keys(hm).map(Number).sort((a,b)=>a-b).map(h=>{const d=hm[h],w=d.tot?(d.wins/d.tot*100).toFixed(1):'0',avg=d.tot?d.pnl/d.tot:0;return`<tr><td><strong>${fH(h)}–${fH(h+1)}</strong></td><td>${d.tot}</td><td>${d.wins}</td><td>${fPct(w)}</td><td style="color:${avg>=0?'var(--accent)':'#ff5f6d'}">${fP(avg)}</td></tr>`;}).join('');}
})();
window.addEventListener('message',async e=>{if(e.data?.type==='tz_settings_updated'){/* reload if needed */}});
</script>
</body>
</html>
