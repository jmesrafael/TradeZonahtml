function fP(v){const n=parseFloat(v);if(isNaN(n))return'—';return(n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2);}
function fPct(v){return parseFloat(v).toFixed(1)+'%';}

// ── AI Analysis Class (TensorFlow.js powered) ──
class TradeAI{
  constructor(trades){this.trades=trades.filter(t=>t.pnl!==''&&!isNaN(parseFloat(t.pnl)));}

  analyze(){
    if(this.trades.length<5)return null;
    return{
      patterns:this.findWinningConditions(),
      anomalies:this.detectAnomalies(),
      forecast:this.forecastPerformance(),
      risk:this.getRiskScore(),
      bestHours:this.findBestTradingHours()
    };
  }

  findWinningConditions(){
    const wins=this.trades.filter(t=>parseFloat(t.pnl)>0);
    const losses=this.trades.filter(t=>parseFloat(t.pnl)<0);
    return{
      bestHour:this.getMostCommon(wins,'time'),
      bestDay:this.getMostCommon(wins,'date'),
      bestMood:this.getMostCommon(wins,'mood'),
      bestPair:this.getMostCommon(wins,'pair'),
      avgConfidence:wins.length?(wins.reduce((a,t)=>a+(t.confidence||0),0)/wins.length).toFixed(1):0,
      avoidHour:this.getMostCommon(losses,'time'),
      avoidPair:this.getMostCommon(losses,'pair')
    };
  }

  findBestTradingHours(){
    const hourStats={};
    this.trades.forEach(t=>{
      const h=parseInt(t.time?.split(':')[0]||0);
      if(!hourStats[h])hourStats[h]={wins:0,total:0,pnl:0};
      hourStats[h].total++;
      if(parseFloat(t.pnl)>0)hourStats[h].wins++;
      hourStats[h].pnl+=parseFloat(t.pnl);
    });
    return Object.entries(hourStats).map(([h,s])=>({hour:h,wr:((s.wins/s.total)*100).toFixed(0),pnl:(s.pnl/s.total).toFixed(2),score:s.wins/s.total})).sort((a,b)=>b.score-a.score).slice(0,3);
  }

  detectAnomalies(){
    const pnls=this.trades.map(t=>parseFloat(t.pnl));
    const mean=pnls.reduce((a,b)=>a+b,0)/pnls.length;
    const std=Math.sqrt(pnls.reduce((sq,n)=>sq+Math.pow(n-mean,2),0)/pnls.length);
    return this.trades.filter(t=>{const z=Math.abs((parseFloat(t.pnl)-mean)/std);return z>2;}).slice(0,3).map(t=>({date:t.date,pair:t.pair,pnl:parseFloat(t.pnl),type:parseFloat(t.pnl)>0?'exceptional':'danger'}));
  }

  forecastPerformance(){
    const last7=this.trades.slice(-7);
    if(last7.length<3)return null;
    const daily=last7.reduce((a,t)=>a+parseFloat(t.pnl),0)/last7.length;
    const vol=Math.sqrt(last7.reduce((sq,t)=>sq+Math.pow(parseFloat(t.pnl)-daily,2),0)/last7.length);
    return{expect:(daily*7).toFixed(0),best:((daily*7)+vol*2).toFixed(0),worst:((daily*7)-vol*2).toFixed(0)};
  }

  getRiskScore(){
    const wr=this.getWinRate();
    const pf=this.getProfitFactor();
    const dd=this.getMaxDrawdown();
    const con=this.getConsistency();
    const score=((wr/50)*0.25+(Math.min(pf,3)/3)*0.25+(100-dd)/100*0.25+con*0.25)*100;
    let level='🔴 High',color='#ff5f6d';
    if(score>70){level='🟢 Low';color='#19c37d';}else if(score>50){level='🟡 Medium';color='#ffb74d';}
    return{score:score.toFixed(0),level,color};
  }

  getMostCommon(trades,field){
    const freq={};trades.forEach(t=>{const v=t[field];freq[v]=(freq[v]||0)+1;});
    const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
    return sorted.length?{name:sorted[0][0],count:sorted[0][1]}:null;
  }

  getWinRate(){const w=this.trades.filter(t=>parseFloat(t.pnl)>0).length;return(w/this.trades.length)*100;}

  getProfitFactor(){
    const w=this.trades.filter(t=>parseFloat(t.pnl)>0).reduce((a,t)=>a+parseFloat(t.pnl),0);
    const l=Math.abs(this.trades.filter(t=>parseFloat(t.pnl)<0).reduce((a,t)=>a+parseFloat(t.pnl),0));
    return l>0?w/l:w>0?999:0;
  }

  getMaxDrawdown(){
    let peak=0,dd=0,eq=0;
    this.trades.forEach(t=>{eq+=parseFloat(t.pnl);if(eq>peak)peak=eq;const d=peak-eq;if(d>dd)dd=d;});
    return dd;
  }

  getConsistency(){
    const daily={};
    this.trades.forEach(t=>{const d=t.date;daily[d]=(daily[d]||0)+parseFloat(t.pnl);});
    const pnls=Object.values(daily);
    const mean=pnls.reduce((a,b)=>a+b,0)/pnls.length;
    const var_=pnls.reduce((sq,n)=>sq+Math.pow(n-mean,2),0)/pnls.length;
    const std=Math.sqrt(var_);
    return std===0?1:Math.max(0,1-(std/Math.abs(mean)));
  }
}

// ── Crosshair: vertical line follows cursor on line charts ──
Chart.register({
  id:'crosshairLine',
  afterDraw(chart){
    if(!chart.options.showCrosshair)return;
    const active=chart.tooltip?._active;
    if(!active?.length)return;
    const{ctx,chartArea:{top,bottom}}=chart;
    const x=active[0].element.x;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x,top);ctx.lineTo(x,bottom);
    ctx.lineWidth=1;ctx.strokeStyle='rgba(255,255,255,.13)';
    ctx.setLineDash([4,4]);ctx.stroke();ctx.restore();
  }
});

// ── Dynamic gradient: green above zero, red below ──
Chart.register({
  id:'dynamicColorGradient',
  beforeRender(chart){
    if(!chart._dynamicColor)return;
    const{ctx,chartArea,scales}=chart;
    if(!chartArea)return;
    const{top,bottom}=chartArea;
    const zeroY=scales.y.getPixelForValue(0);
    const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
    const zr=clamp((zeroY-top)/(bottom-top),0,1);
    const a=Math.max(0,zr-.001),b=Math.min(1,zr+.001);
    const bd=ctx.createLinearGradient(0,top,0,bottom);
    bd.addColorStop(0,'#19c37d');bd.addColorStop(a,'#19c37d');
    bd.addColorStop(b,'#ff5f6d');bd.addColorStop(1,'#ff5f6d');
    const bg=ctx.createLinearGradient(0,top,0,bottom);
    bg.addColorStop(0,'#19c37d30');bg.addColorStop(a,'#19c37d08');
    bg.addColorStop(b,'#ff5f6d08');bg.addColorStop(1,'#ff5f6d30');
    const ds=chart.data.datasets[0];
    ds.borderColor=bd;ds.backgroundColor=bg;
    ds.pointBackgroundColor=(ds.data||[]).map(v=>v>=0?'#19c37d':'#ff5f6d');
    ds.pointHoverBackgroundColor=ds.pointBackgroundColor;
  }
});

// ── Doughnut center text ──
Chart.register({
  id:'doughnutCenterText',
  afterDatasetsDraw(chart){
    if(!chart._centerText)return;
    const{ctx,chartArea,data}=chart;
    const{x:cx,y:cy}=chart.getDatasetMeta(0).data[0]||{x:chartArea.left+chartArea.width/2,y:chartArea.top+chartArea.height/2};
    const textColor=getComputedStyle(document.documentElement).getPropertyValue('--text').trim()||'#e6f2ec';
    const mutedColor=getComputedStyle(document.documentElement).getPropertyValue('--muted').trim()||'#8fa39a';
    const bodyFont=getComputedStyle(document.documentElement).getPropertyValue('--font-body').trim()||'Inter, sans-serif';
    ctx.save();
    ctx.font=`bold 24px ${bodyFont}`;
    ctx.fillStyle=chart._centerColor||textColor;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(chart._centerText,cx,cy-6);
    ctx.font=`11px ${bodyFont}`;
    ctx.fillStyle=mutedColor;
    ctx.fillText('Win Rate',cx,cy+12);
    ctx.restore();
  }
});

  twt.forEach(t=>{const h=parseInt(t.time.split(':')[0],10);if(!hm[h])hm[h]={tot:0,wins:0,pnl:0};hm[h].tot++;const p=parseFloat(t.pnl)||0;if(p>0)hm[h].wins++;hm[h].pnl+=p;});
  function fH(h){if(h===0)return'12 AM';if(h===12)return'12 PM';return h<12?h+' AM':(h-12)+' PM';}
  const hl=Array.from({length:24},(_,i)=>fH(i)),hc=Array.from({length:24},(_,i)=>(hm[i]||{tot:0}).tot),ha=Array.from({length:24},(_,i)=>{const d=hm[i];return(!d||!d.tot)?0:+(d.pnl/d.tot).toFixed(2);});
  if(twt.length){
    new Chart(document.getElementById('hh'),{type:'bar',data:{labels:hl,datasets:[{data:hc,backgroundColor:hc.map(v=>v>0?G+'cc':gc),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:true,maxBarThickness:28,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:24,font:{size:10}}},y:{ticks:{stepSize:1}}}}});
    new Chart(document.getElementById('hp'),{type:'bar',data:{labels:hl,datasets:[{data:ha,backgroundColor:ha.map(v=>v>0?G+'cc':v<0?R+'cc':gc),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:true,maxBarThickness:28,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:24,font:{size:10}}},y:{}}}});
    document.getElementById('tb').innerHTML=Object.keys(hm).map(Number).sort((a,b)=>a-b).map(h=>{const d=hm[h],w=d.tot?(d.wins/d.tot*100).toFixed(1):'0',avg=d.tot?d.pnl/d.tot:0;return`<tr><td><strong>${fH(h)}–${fH(h+1)}</strong></td><td>${d.tot}</td><td style="color:#19c37d">${d.wins}</td><td style="color:${parseFloat(w)>=50?'#19c37d':'#ff5f6d'}">${fPct(w)}</td><td style="color:${avg>=0?'#19c37d':'#ff5f6d'}">${fP(avg)}</td></tr>`;}).join('');
  }

  const pnldEl=document.getElementById('pnld');
  if(pnldEl&&vld.length){
    const pnlVals=vld.map(t=>parseFloat(t.pnl));
    const minPnl=Math.min(...pnlVals);
    const maxPnl=Math.max(...pnlVals);
    const range=maxPnl-minPnl;
    const binCount=Math.min(12,Math.max(5,Math.ceil(Math.sqrt(vld.length))));
    const binSize=range/binCount;
    const bins=Array(binCount).fill(0);
    const binLabels=[];
    for(let i=0;i<binCount;i++){
      const start=minPnl+i*binSize;
      const end=start+binSize;
      binLabels.push(i===0?fP(start):fP(end));
    }
    pnlVals.forEach(v=>{let idx=Math.floor((v-minPnl)/binSize);if(idx>=binCount)idx=binCount-1;bins[idx]++;});
    const binColors=binLabels.map((l,i)=>{const mid=minPnl+(i+0.5)*binSize;return mid>=0?G+'cc':R+'cc';});
    new Chart(pnldEl,{type:'bar',data:{labels:binLabels,datasets:[{data:bins,backgroundColor:binColors,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:12,font:{size:10}}},y:{ticks:{stepSize:1}}}}});
  }
})();
</script>
</body>
</html>
