<!-- journal.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeZona — Journal</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0f0c;--panel:#111816;--accent:#00ff88;--accent2:#19c37d;--border:#1c2a25;--text:#e6f2ec;--muted:#8fa39a}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column}
/* Loader */
.page-loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .35s}
.page-loader.gone{opacity:0;pointer-events:none}
.pl-logo{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;text-align:center;margin-bottom:18px}
.pl-logo span{color:var(--accent)}
.pl-spin{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;gap:12px;flex-wrap:wrap}
.hleft{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:7px 11px;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;font-family:'Inter',sans-serif;flex-shrink:0;white-space:nowrap}
.back-btn:hover{border-color:var(--accent2);color:var(--text)}
.jname{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.hright{display:flex;align-items:center;gap:8px;flex-shrink:0}
.huser-info{display:flex;align-items:center;gap:7px;padding:5px 10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .2s}
.huser-info:hover{border-color:var(--accent2)}
.huser-name{font-size:12px;color:var(--muted);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plan-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.badge-pro{background:rgba(0,255,136,.15);color:var(--accent2);border:1px solid rgba(0,255,136,.3)}
.badge-free{background:rgba(143,163,154,.1);color:var(--muted);border:1px solid var(--border)}
/* Nav */
nav{display:flex;gap:2px;padding:8px 18px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;overflow-x:auto;scrollbar-width:none;align-items:center}
nav::-webkit-scrollbar{display:none}
.tab{padding:7px 13px;background:none;border:none;color:var(--muted);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;border-radius:7px;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--text);background:rgba(255,255,255,.04)}
.tab.active{color:var(--accent);background:rgba(0,255,136,.08)}
.tab-spacer{flex:1}
.pro-tab-badge{font-size:8px;background:rgba(0,255,136,.15);color:var(--accent2);border-radius:4px;padding:1px 5px;font-weight:700;letter-spacing:.3px}
/* Tab content */
.tab-content{display:none;flex:1;overflow:hidden;position:relative}
.tab-content.active{display:flex;flex-direction:column}
iframe{flex:1;border:none;width:100%;height:100%;min-height:calc(100vh - 115px);opacity:0;transition:opacity .25s}
iframe.ready{opacity:1}
.tab-loader{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10;transition:opacity .3s}
.tab-loader.hidden{opacity:0;pointer-events:none}
.tab-loader-spin{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.tab-loader-label{font-size:13px;color:var(--muted)}
/* Pro gate overlay */
.pro-gate{position:absolute;inset:0;background:rgba(11,15,12,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;z-index:20;backdrop-filter:blur(4px)}
.pro-gate h3{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;margin-bottom:10px}
.pro-gate p{font-size:13px;color:var(--muted);line-height:1.7;max-width:360px;margin-bottom:22px}
.pro-gate-btn{background:var(--accent);color:#0b0f0c;border:none;border-radius:9px;padding:12px 24px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
.pro-gate-btn:hover{opacity:.85}
/* Toast — TOP center */
#toast{
  position:fixed;top:20px;left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:11px 18px;font-size:13px;color:var(--text);
  box-shadow:0 8px 28px rgba(0,0,0,.45);z-index:99999;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  white-space:nowrap;display:flex;align-items:center;gap:8px;max-width:92vw
}
#toast.show{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0);animation:slideDown .25s ease}
#toast.toast-green{border-color:rgba(0,255,136,.45);background:rgba(0,255,136,.08)}
#toast.toast-red{border-color:rgba(255,95,109,.45);background:rgba(255,95,109,.08)}
</style>
</head>
<body>

<div class="page-loader" id="pageLoader">
  <div><div class="pl-logo">Trade<span>Zona</span></div><div class="pl-spin"></div></div>
</div>

<header>
  <div class="hleft">
    <button class="back-btn" onclick="goBack()"><i class="fa-solid fa-chevron-left"></i> Dashboard</button>
    <span class="jname" id="jnameHdr">Journal</span>
  </div>
  <div class="hright">
    <div class="huser-info" onclick="location.href='/subscription'" title="View subscription">
      <i class="fa-solid fa-circle-user" style="color:var(--muted);font-size:13px"></i>
      <span class="huser-name" id="hUserName">—</span>
      <span class="plan-badge badge-free" id="hPlanBadge">Free</span>
    </div>
  </div>
</header>

<nav>
  <button class="tab active" data-tab="logs"       onclick="switchTab('logs')"><i class="fa-solid fa-table-list"></i>Logs</button>
  <button class="tab"        data-tab="calendar"   onclick="switchTab('calendar')"><i class="fa-solid fa-calendar-days"></i>Calendar</button>
  <button class="tab"        data-tab="gallery"    onclick="switchTab('gallery')"><i class="fa-solid fa-images"></i>Gallery</button>
  <button class="tab"        data-tab="analytics"  onclick="switchTab('analytics')"><i class="fa-solid fa-chart-line"></i>Analytics</button>
  <button class="tab"        data-tab="calculator" onclick="switchTab('calculator')"><i class="fa-solid fa-calculator"></i>Calculator<span class="pro-tab-badge" id="calcBadge" style="display:none">PRO</span></button>
  <div class="tab-spacer"></div>
  <button class="tab"        data-tab="settings"   onclick="switchTab('settings')"><i class="fa-solid fa-gear"></i>Settings</button>
</nav>

<!-- Tab: Logs -->
<div class="tab-content active" id="tab-logs">
  <div class="tab-loader hidden" id="loader-logs"><div class="tab-loader-spin"></div><span class="tab-loader-label">Loading…</span></div>
  <iframe src="logs.html" id="logsFrame" onload="frameReady('logs')"></iframe>
</div>
<!-- Tab: Calendar -->
<div class="tab-content" id="tab-calendar">
  <div class="tab-loader" id="loader-calendar"><div class="tab-loader-spin"></div><span class="tab-loader-label">Loading calendar…</span></div>
  <iframe id="calFrame" onload="frameReady('calendar')"></iframe>
</div>
<!-- Tab: Gallery -->
<div class="tab-content" id="tab-gallery">
  <div class="tab-loader" id="loader-gallery"><div class="tab-loader-spin"></div><span class="tab-loader-label">Loading gallery…</span></div>
  <iframe id="galFrame" onload="frameReady('gallery')"></iframe>
</div>
<!-- Tab: Analytics -->
<div class="tab-content" id="tab-analytics">
  <div class="tab-loader" id="loader-analytics"><div class="tab-loader-spin"></div><span class="tab-loader-label">Loading analytics…</span></div>
  <iframe id="analyticsFrame" onload="frameReady('analytics')"></iframe>
</div>
<!-- Tab: Calculator — Pro gate wraps the iframe -->
<div class="tab-content" id="tab-calculator">
  <div class="tab-loader hidden" id="loader-calculator"><div class="tab-loader-spin"></div><span class="tab-loader-label">Loading calculator…</span></div>
  <div class="pro-gate" id="calcProGate">
    <i class="fa-solid fa-calculator" style="font-size:42px;color:var(--muted);opacity:.3;margin-bottom:18px"></i>
    <h3>Calculator — Pro Feature</h3>
    <p>The trading risk calculator helps you calculate position size, pip value, margin, P&L, and R:R ratio in real-time before placing a trade.</p>
    <button class="pro-gate-btn" onclick="location.href='/subscription'"><i class="fa-solid fa-arrow-up" style="margin-right:7px"></i>Upgrade to Pro — $5/mo</button>
  </div>
  <iframe id="calcFrame" onload="frameReady('calculator')" style="display:none"></iframe>
</div>
<!-- Tab: Settings -->
<div class="tab-content" id="tab-settings">
  <div class="tab-loader" id="loader-settings"><div class="tab-loader-spin"></div><span class="tab-loader-label">Loading settings…</span></div>
  <iframe id="settingsFrame" onload="frameReady('settings')" style="flex:1;border:none;width:100%;min-height:calc(100vh - 115px);opacity:0;transition:opacity .25s"></iframe>
</div>


<div id="toast"><i id="toastIcon" class="fa-solid fa-circle-check"></i><span id="toastMsg"></span></div>

<script>
// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
const TABS=['logs','calendar','gallery','analytics','calculator','settings'];
let activeTab='logs', journalId=sessionStorage.getItem('tz_current_journal');
let journalObj=null, settings=null, currentUser=null, userIsPro=false;

// ── Theme ──────────────────────────────────────────
function applyTheme(t){const r=document.documentElement,dark=t==='dark'||(t==='system'&&!window.matchMedia('(prefers-color-scheme:light)').matches);if(!dark){r.style.setProperty('--bg','#f4f7f5');r.style.setProperty('--panel','#ffffff');r.style.setProperty('--accent','#19c37d');r.style.setProperty('--accent2','#0fa86a');r.style.setProperty('--border','#dde8e3');r.style.setProperty('--text','#0f1c17');r.style.setProperty('--muted','#6b8578');}else{r.style.setProperty('--bg','#0b0f0c');r.style.setProperty('--panel','#111816');r.style.setProperty('--accent','#00ff88');r.style.setProperty('--accent2','#19c37d');r.style.setProperty('--border','#1c2a25');r.style.setProperty('--text','#e6f2ec');r.style.setProperty('--muted','#8fa39a');}}
applyTheme(localStorage.getItem('tl_theme')||'dark');

// ── Boot ───────────────────────────────────────────
(async()=>{
  currentUser=await requireAuth(); if(!currentUser)return;
  if(!journalId){location.href='/dashboard';return;}
  const profile=await getProfile(currentUser.id);
  userIsPro=profile?.plan==='pro';
  window._userIsPro=userIsPro;
  document.getElementById('hUserName').textContent=profile?.name||currentUser.email;
  if(userIsPro){
    document.getElementById('hPlanBadge').textContent='Pro';
    document.getElementById('hPlanBadge').className='plan-badge badge-pro';
    // Show calculator for Pro
    document.getElementById('calcProGate').style.display='none';
    document.getElementById('calcFrame').style.display='';
  } else {
    // Show PRO badge on calculator tab for free users
    document.getElementById('calcBadge').style.display='';
  }
  const journals=await getJournals(currentUser.id);
  journalObj=journals.find(j=>j.id===journalId);
  if(!journalObj){location.href='/dashboard';return;}
  document.getElementById('jnameHdr').textContent=journalObj.name;
  document.title='TradeZona — '+journalObj.name;
  settings=await getJournalSettings(journalId);
  bcast({type:'tz_plan',isPro:userIsPro});
  document.getElementById('pageLoader').classList.add('gone');
  setTimeout(()=>{const pl=document.getElementById('pageLoader');if(pl)pl.style.display='none';},400);
  const lf=document.getElementById('logsFrame');
  if(lf?.contentDocument?.readyState==='complete')frameReady('logs');
})();

// ── Navigation ──────────────────────────────────────
// ── Safe navigation — always flush logs before leaving ─────────
// When the user navigates away, we ask the logs iframe to save all pending
// changes first, wait for its 'tz_flushed' ack, then navigate.
// This is the only reliable way to save because async fetch() is cancelled
// when an iframe is destroyed mid-flight.
let _flushTarget=null; // where to navigate after flush
let _flushTimer=null;

function navigateSafely(dest){
  const logsFrame=document.getElementById('logsFrame');
  // If logs iframe isn't loaded or has no pending saves, navigate immediately
  if(!logsFrame?.contentWindow){location.href=dest;return;}
  _flushTarget=dest;
  // Give the iframe 2s max to flush — then navigate regardless
  clearTimeout(_flushTimer);
  _flushTimer=setTimeout(()=>{_flushTarget=null;location.href=dest;},2000);
  try{logsFrame.contentWindow.postMessage({type:'tz_flush_request'},'*');}
  catch(e){location.href=dest;}
}

// Listen for flush completion and settings updates from iframes
window.addEventListener('message',e=>{
  if(e.data?.type==='tz_flushed'&&_flushTarget){
    clearTimeout(_flushTimer);const dest=_flushTarget;_flushTarget=null;location.href=dest;
  }
  if(e.data?.type==='tz_settings_updated'){
    // Update journal name in header if changed
    if(e.data.journalName){
      document.getElementById('jnameHdr').textContent=e.data.journalName;
      document.title='TradeZona — '+e.data.journalName;
      if(journalObj)journalObj.name=e.data.journalName;
    }
    // Reload logs if trades were imported
    if(e.data.reloadLogs){
      const lf=document.getElementById('logsFrame');
      if(lf)lf.src='logs.html?t='+Date.now();
    }
    bcast({type:'tz_settings_updated'});
  }
  if(e.data?.type==='tz_journal_deleted'){
    sessionStorage.removeItem('tz_current_journal');
    location.href='/dashboard';
  }
});

function goBack(){navigateSafely('/dashboard');}

function switchTab(name){
  TABS.forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===name);
    document.querySelector(`[data-tab="${t}"]`)?.classList.toggle('active',t===name);
  });
  activeTab=name;
  const frameMap={
    calendar:  {id:'calFrame',       src:'calendar.html'},
    gallery:   {id:'galFrame',       src:'gallery.html'},
    analytics: {id:'analyticsFrame', src:'analytics.html'},
    calculator:{id:'calcFrame',      src:'calculator.html'},
    settings:  {id:'settingsFrame',  src:'journalsettings.html'},
  };
  if(frameMap[name]&&(name!=='calculator'||userIsPro)){
    const{id,src}=frameMap[name];
    const f=document.getElementById(id);
    showTabLoader(name); f.classList.remove('ready');
    f.src=src+'?t='+Date.now();
  }
  if(window.posthog&&name==='calculator')posthog.capture('calculator_tab_opened');
}

function showTabLoader(n){const l=document.getElementById('loader-'+n);if(l){l.style.display='';l.classList.remove('hidden');}}
function frameReady(n){
  const map={logs:'logsFrame',calendar:'calFrame',gallery:'galFrame',analytics:'analyticsFrame',calculator:'calcFrame',settings:'settingsFrame'};
  const f=document.getElementById(map[n]);
  try{if(f?.contentWindow?.applyTheme)f.contentWindow.applyTheme(localStorage.getItem('tl_theme')||'dark');}catch(e){}
  try{if(f?.contentWindow)f.contentWindow.postMessage({type:'tz_plan',isPro:userIsPro},'*');}catch(e){}
  if(f){f.classList.add('ready');const l=document.getElementById('loader-'+n);if(l){l.classList.add('hidden');setTimeout(()=>{if(l.classList.contains('hidden'))l.style.display='none';},350);}}
}
function bcast(msg){['logsFrame','calFrame','galFrame','analyticsFrame','calcFrame','settingsFrame'].forEach(id=>{const f=document.getElementById(id);try{if(f?.contentWindow)f.contentWindow.postMessage(msg,'*');}catch(e){}});}

// ── Toast ──────────────────────────────────────────
let _tt;
function showToast(msg,icon='fa-solid fa-circle-check',type=''){
  const t=document.getElementById('toast');
  document.getElementById('toastIcon').className=icon;
  document.getElementById('toastMsg').innerHTML=msg;
  t.className='show'+(type==='green'?' toast-green':type==='red'?' toast-red':'');
  clearTimeout(_tt);
  _tt=setTimeout(()=>{t.classList.remove('show','toast-green','toast-red');},3500);
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}


</script>
</body>
</html>
